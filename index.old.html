<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useCallback, useEffect, useMemo, useRef } = React;

        // ============================================
        // SIMPLE STATE MANAGEMENT (Zustand-like)
        // ============================================
        const createStore = (initialState) => {
            let state = initialState;
            const listeners = new Set();

            const getState = () => state;

            const setState = (partial) => {
                const nextState = typeof partial === 'function' ? partial(state) : partial;
                state = { ...state, ...nextState };
                listeners.forEach(listener => listener(state));
            };

            const subscribe = (listener) => {
                listeners.add(listener);
                return () => listeners.delete(listener);
            };

            const useStore = (selector) => {
                const [, forceUpdate] = useState({});
                useEffect(() => {
                    return subscribe(() => forceUpdate({}));
                }, []);
                return selector ? selector(state) : state;
            };

            return { getState, setState, subscribe, useStore };
        };

        // ============================================
        // PROJECT STORE
        // ============================================
        const projectStore = createStore({
            currentTemplate: null,
            projectName: '',
            assets: {
                background: null,
                frames: [],
                isiImage: null,
                video: null
            },
            config: {
                clickTag1: 'https://education.patientpoint.com/failsafe-page/',
                clickTag2: 'https://education.patientpoint.com/failsafe-page/',
                clickTag3: 'https://education.patientpoint.com/failsafe-page/',
                clickTag4: 'https://education.patientpoint.com/failsafe-page/',
                dimensions: { width: 1080, height: 1733 },
                // ISI Scroller settings
                autoScrollSpeed: 80,
                scrollStep: 5,
                isiHeight: 540,
                isiTop: 1193,
                isiWidth: 1080,
                isiLeft: 0,
                isiBackgroundColor: '#ffffff',
                // Scroller styling
                scrollerColor: '#798280',
                scrollerWidth: 12,
                scrollerHeight: 35,
                scrollerBorderRadius: 50,
                scrollerTrackColor: '#b8bebc',
                scrollerTrackWidth: 12,
                // Animation settings
                frameDuration: 0.5,
                frameDelay: 1,
                expandedHeight: 1742,
                collapseDuration: 1,
                // Video settings
                videoHeight: 562,
                showVideoControls: true,
                // Button settings (for INT templates)
                buttonCount: 2,
                buttons: [
                    { text: 'Learn More', bgColor: '#6cc04a', textColor: '#ffffff', borderColor: '#6cc04a', borderRadius: 4, width: 200, height: 50, top: 100, left: 50 },
                    { text: 'Contact Us', bgColor: '#0066cc', textColor: '#ffffff', borderColor: '#0066cc', borderRadius: 4, width: 200, height: 50, top: 100, left: 300 },
                    { text: 'Button 3', bgColor: '#333333', textColor: '#ffffff', borderColor: '#333333', borderRadius: 4, width: 200, height: 50, top: 160, left: 50 },
                    { text: 'Button 4', bgColor: '#333333', textColor: '#ffffff', borderColor: '#333333', borderRadius: 4, width: 200, height: 50, top: 160, left: 300 }
                ],
                // Click Zones (for MR and CP templates)
                clickZones: [
                    { id: 'clickTag1', url: 'https://education.patientpoint.com/failsafe-page/', top: 0, left: 0, width: 1080, height: 1193, inISI: false }
                ]
            },
            isiContent: {
                mode: 'upload',
                text: '',
                fontFamily: 'Arial',
                fontSize: 14,
                lineHeight: 1.4
            },
            animations: [],
            animationReplayCount: 0,
            isPreviewDirty: false
        });

        const useProjectStore = projectStore.useStore;
        const setProjectState = projectStore.setState;

        // ============================================
        // LOCAL STORAGE PERSISTENCE
        // ============================================
        const STORAGE_KEY = 'ad-builder-autosave';

        const saveToLocalStorage = () => {
            try {
                const state = projectStore.getState();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {
                console.warn('Failed to save to localStorage:', e);
            }
        };

        const loadFromLocalStorage = () => {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.currentTemplate) {
                        setProjectState(data);
                        return true;
                    }
                }
            } catch (e) {
                console.warn('Failed to load from localStorage:', e);
            }
            return false;
        };

        // Auto-save on state changes (debounced)
        let saveTimeout = null;
        projectStore.subscribe(() => {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveToLocalStorage, 1000);
        });

        // ============================================
        // VIDEO SPECS & VALIDATION
        // ============================================
        const VIDEO_SPECS = {
            maxSizeMB: 50,
            maxDurationSec: 120,
            recommendedCodec: 'H.264',
            recommendedFormat: 'MP4',
            maxBitrateMbps: 8
        };

        const validateVideo = (file) => {
            const warnings = [];
            const errors = [];

            // Check file size
            const sizeMB = file.size / (1024 * 1024);
            if (sizeMB > VIDEO_SPECS.maxSizeMB) {
                errors.push(`File size (${sizeMB.toFixed(1)}MB) exceeds ${VIDEO_SPECS.maxSizeMB}MB limit`);
            } else if (sizeMB > VIDEO_SPECS.maxSizeMB * 0.8) {
                warnings.push(`File size (${sizeMB.toFixed(1)}MB) is close to ${VIDEO_SPECS.maxSizeMB}MB limit`);
            }

            // Check file type
            if (!file.type.includes('mp4')) {
                warnings.push(`Format "${file.type}" may not be supported. Use MP4 (H.264)`);
            }

            return { warnings, errors, sizeMB };
        };

        // Store actions
        // Default ISI dimensions per brand/size
        const ISI_DEFAULTS = {
            cp: { isiWidth: 1080, isiHeight: 540, isiTop: 1193, isiLeft: 0 },
            mr: { isiWidth: 300, isiHeight: 100, isiTop: 150, isiLeft: 0 },
            int: { isiWidth: 1080, isiHeight: 540, isiTop: 1193, isiLeft: 0 },
        };

        const setTemplate = (template) => {
            const isiDefaults = ISI_DEFAULTS[template.brand] || ISI_DEFAULTS.cp;
            const hasISI = template.features?.includes('isi');
            setProjectState({
                currentTemplate: template,
                projectName: `${template.id}-${Date.now()}`,
                config: {
                    ...projectStore.getState().config,
                    dimensions: template.dimensions,
                    ...(hasISI ? isiDefaults : {}),
                    // Reset click zones to match new dimensions
                    clickZones: [
                        { id: 'clickTag1', url: 'https://education.patientpoint.com/failsafe-page/', top: 0, left: 0, width: template.dimensions.width, height: hasISI ? isiDefaults.isiTop : template.dimensions.height, inISI: false }
                    ]
                }
            });
        };

        const clearProject = () => {
            setProjectState({
                currentTemplate: null,
                projectName: '',
                assets: { background: null, frames: [], isiImage: null, video: null },
                animations: [],
                isPreviewDirty: false
            });
        };

        const setAsset = (key, value) => {
            const state = projectStore.getState();
            setProjectState({
                assets: { ...state.assets, [key]: value },
                isPreviewDirty: true
            });
        };

        const updateConfig = (key, value) => {
            const state = projectStore.getState();
            setProjectState({
                config: { ...state.config, [key]: value },
                isPreviewDirty: true
            });
        };

        const setIsiContent = (content) => {
            const state = projectStore.getState();
            setProjectState({
                isiContent: { ...state.isiContent, ...content },
                isPreviewDirty: true
            });
        };

        const setAnimations = (animations) => {
            setProjectState({ animations, isPreviewDirty: true });
        };

        const triggerAnimationReplay = () => {
            const current = projectStore.getState().animationReplayCount || 0;
            setProjectState({ animationReplayCount: current + 1 });
        };

        // ============================================
        // TEMPLATES
        // ============================================
        const TEMPLATE_CATEGORIES = {
            static: 'Static',
            animated: 'Animated',
            video: 'Video',
            modal: 'Modal'
        };

        const templates = [
            {
                id: 'cp-static',
                name: 'CP Static',
                category: 'static',
                brand: 'cp',
                description: 'Single image static ad with click handler',
                dimensions: { width: 1080, height: 1733 },
                features: [],
                requiredAssets: ['background'],
            },
            {
                id: 'cp-static-isi',
                name: 'CP Static + ISI',
                category: 'static',
                brand: 'cp',
                description: 'Static ad with scrollable Important Safety Information',
                dimensions: { width: 1080, height: 1733 },
                features: ['isi'],
                requiredAssets: ['background', 'isiImage'],
            },
            {
                id: 'cp-animated-isi',
                name: 'CP Animated + ISI',
                category: 'animated',
                brand: 'cp',
                description: 'Multi-frame animated ad with ISI',
                dimensions: { width: 1080, height: 1733 },
                features: ['isi', 'animation'],
                requiredAssets: ['background', 'frames', 'isiImage'],
            },
            {
                id: 'cp-animated-isi-expandable',
                name: 'CP Animated + Expandable ISI',
                category: 'animated',
                brand: 'cp',
                description: 'Animated ad with expandable/collapsible ISI section',
                dimensions: { width: 1080, height: 1733 },
                features: ['isi', 'animation', 'expandable'],
                requiredAssets: ['background', 'frames', 'isiImage'],
            },
            {
                id: 'int-static',
                name: 'INT Static',
                category: 'static',
                brand: 'int',
                description: 'Single image static ad',
                dimensions: { width: 1000, height: 1600 },
                features: [],
                requiredAssets: ['background'],
            },
            {
                id: 'int-animated-isi',
                name: 'INT Animated + ISI',
                category: 'animated',
                brand: 'int',
                description: 'Multi-frame animated ad with ISI',
                dimensions: { width: 1000, height: 1600 },
                features: ['isi', 'animation'],
                requiredAssets: ['background', 'frames', 'isiImage'],
            },
            {
                id: 'int-mod-video-0-buttons',
                name: 'INT Video (No Buttons)',
                category: 'video',
                brand: 'int',
                description: 'Video ad with no CTA buttons',
                dimensions: { width: 1000, height: 750 },
                features: ['video'],
                requiredAssets: ['video'],
            },
            {
                id: 'int-mod-video-1-2-buttons',
                name: 'INT Video (1-2 Buttons)',
                category: 'video',
                brand: 'int',
                description: 'Video ad with 1-2 CTA buttons (PI, MG)',
                dimensions: { width: 1000, height: 750 },
                features: ['video', 'buttons'],
                requiredAssets: ['video'],
            },
            {
                id: 'mr-static',
                name: 'MR Static',
                category: 'static',
                brand: 'mr',
                description: 'Small format static ad',
                dimensions: { width: 300, height: 250 },
                features: [],
                requiredAssets: ['background'],
            },
            {
                id: 'mr-animated-isi',
                name: 'MR Animated + ISI',
                category: 'animated',
                brand: 'mr',
                description: 'Small format animated ad with ISI',
                dimensions: { width: 300, height: 250 },
                features: ['isi', 'animation'],
                requiredAssets: ['background', 'frames', 'isiImage'],
            },
            {
                id: 'cp-static-open-mod',
                name: 'CP Static + Modal',
                category: 'modal',
                brand: 'cp',
                description: 'Static ad that opens a modal secondary ad',
                dimensions: { width: 1080, height: 1733 },
                features: ['modal'],
                requiredAssets: ['background'],
            },
            {
                id: 'mr-static-open-mod',
                name: 'MR Static + Modal',
                category: 'modal',
                brand: 'mr',
                description: 'Small static ad that opens a modal',
                dimensions: { width: 300, height: 250 },
                features: ['modal'],
                requiredAssets: ['background'],
            }
        ];

        const hasFeature = (template, feature) => template?.features?.includes(feature);

        // ============================================
        // IMAGE PROCESSOR
        // ============================================
        const isSvg = (file) => file.type === 'image/svg+xml' || file.name.toLowerCase().endsWith('.svg');

        const fileToDataUrl = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.onerror = () => reject(new Error('Failed to read file'));
            reader.readAsDataURL(file);
        });

        const getImageDimensions = (file) => new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                resolve({ width: img.width, height: img.height });
                URL.revokeObjectURL(img.src);
            };
            img.onerror = () => reject(new Error('Failed to load image'));
            img.src = URL.createObjectURL(file);
        });

        const svgToPng = (svgFile) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width || 1080;
                    canvas.height = img.height || 1733;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('Conversion failed')), 'image/png');
                };
                img.onerror = () => reject(new Error('Failed to load SVG'));
                const svgBlob = new Blob([e.target.result], { type: 'image/svg+xml' });
                img.src = URL.createObjectURL(svgBlob);
            };
            reader.readAsText(svgFile);
        });

        // ============================================
        // TEMPLATE CARD
        // ============================================
        function TemplateCard({ template }) {
            const categoryColors = {
                static: 'bg-gray-100 text-gray-700',
                animated: 'bg-purple-100 text-purple-700',
                video: 'bg-red-100 text-red-700',
                modal: 'bg-green-100 text-green-700'
            };

            const featureColors = {
                isi: 'bg-blue-100 text-blue-700',
                animation: 'bg-purple-100 text-purple-700',
                video: 'bg-red-100 text-red-700',
                expandable: 'bg-yellow-100 text-yellow-700',
            };

            return (
                <div
                    onClick={() => setTemplate(template)}
                    className="bg-white rounded-lg border border-gray-200 overflow-hidden hover:shadow-lg hover:border-blue-300 transition-all cursor-pointer group"
                >
                    <div className="aspect-[4/3] bg-gray-100 flex items-center justify-center relative">
                        <div className="text-center p-4">
                            <div className="text-3xl font-bold text-gray-300 mb-2">
                                {template.dimensions.width}x{template.dimensions.height}
                            </div>
                            <div className="text-sm text-gray-400">{template.brand.toUpperCase()}</div>
                        </div>
                        <div className="absolute inset-0 bg-blue-600 bg-opacity-0 group-hover:bg-opacity-10 transition-all flex items-center justify-center">
                            <span className="opacity-0 group-hover:opacity-100 text-blue-600 font-medium bg-white px-4 py-2 rounded-lg shadow">
                                Select Template
                            </span>
                        </div>
                    </div>
                    <div className="p-4">
                        <div className="flex items-center gap-2 mb-2">
                            <span className={`text-xs px-2 py-0.5 rounded-full ${categoryColors[template.category]}`}>
                                {TEMPLATE_CATEGORIES[template.category]}
                            </span>
                        </div>
                        <h3 className="font-semibold text-gray-900 mb-1">{template.name}</h3>
                        <p className="text-sm text-gray-500 mb-3">{template.description}</p>
                        {template.features.length > 0 && (
                            <div className="flex flex-wrap gap-1">
                                {template.features.map((feature) => (
                                    <span key={feature} className={`text-xs px-2 py-0.5 rounded ${featureColors[feature] || 'bg-gray-100'}`}>
                                        {feature.toUpperCase()}
                                    </span>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ============================================
        // TEMPLATE GRID
        // ============================================
        function TemplateGrid() {
            const [categoryFilter, setCategoryFilter] = useState('all');
            const [brandFilter, setBrandFilter] = useState('all');

            const filteredTemplates = templates.filter((t) => {
                if (categoryFilter !== 'all' && t.category !== categoryFilter) return false;
                if (brandFilter !== 'all' && t.brand !== brandFilter) return false;
                return true;
            });

            return (
                <div className="min-h-screen bg-gray-50">
                    <header className="bg-white border-b border-gray-200 px-8 py-6">
                        <h1 className="text-2xl font-bold text-gray-900">Ad Builder</h1>
                        <p className="text-gray-600 mt-1">Select a template to start creating your ad</p>
                    </header>
                    <div className="px-8 py-4 bg-white border-b border-gray-200 flex gap-4">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Category</label>
                            <select value={categoryFilter} onChange={(e) => setCategoryFilter(e.target.value)}
                                className="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                                <option value="all">All Categories</option>
                                <option value="static">Static</option>
                                <option value="animated">Animated</option>
                                <option value="video">Video</option>
                                <option value="modal">Modal</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Size</label>
                            <select value={brandFilter} onChange={(e) => setBrandFilter(e.target.value)}
                                className="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                                <option value="all">All Sizes</option>
                                <option value="cp">CP (1080x1733)</option>
                                <option value="int">INT (1000x1600)</option>
                                <option value="mr">MR (300x250)</option>
                            </select>
                        </div>
                    </div>
                    <div className="px-8 py-6">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {filteredTemplates.map((template) => (
                                <TemplateCard key={template.id} template={template} />
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // ASSET UPLOADER
        // ============================================
        function AssetUploader({ label, description, currentAsset, onUpload, onRemove }) {
            const [isDragging, setIsDragging] = useState(false);
            const [svgPrompt, setSvgPrompt] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);

            const handleFile = async (file) => {
                if (!file) return;
                setIsProcessing(true);

                if (isSvg(file)) {
                    setSvgPrompt(file);
                    setIsProcessing(false);
                    return;
                }

                try {
                    const dataUrl = await fileToDataUrl(file);
                    const dimensions = await getImageDimensions(file);
                    onUpload({ dataUrl, dimensions, name: file.name });
                } catch (err) {
                    alert('Failed to process image');
                }
                setIsProcessing(false);
            };

            const handleSvgConvert = async () => {
                setIsProcessing(true);
                try {
                    const pngBlob = await svgToPng(svgPrompt);
                    const pngFile = new File([pngBlob], svgPrompt.name.replace(/\.svg$/i, '.png'), { type: 'image/png' });
                    const dataUrl = await fileToDataUrl(pngFile);
                    const dimensions = await getImageDimensions(pngFile);
                    onUpload({ dataUrl, dimensions, name: pngFile.name, converted: true });
                } catch (err) {
                    alert('Failed to convert SVG');
                }
                setSvgPrompt(null);
                setIsProcessing(false);
            };

            if (svgPrompt) {
                return (
                    <div className="space-y-2">
                        <label className="block text-sm font-medium text-gray-700">{label}</label>
                        <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                            <h4 className="font-medium text-yellow-800">SVG Detected</h4>
                            <p className="text-sm text-yellow-700 mt-1">SVG files aren't supported on target devices.</p>
                            <div className="flex gap-2 mt-3">
                                <button onClick={handleSvgConvert} className="px-3 py-1.5 bg-yellow-600 text-white text-sm rounded hover:bg-yellow-700">
                                    Convert to PNG
                                </button>
                                <button onClick={() => setSvgPrompt(null)} className="px-3 py-1.5 bg-white border border-yellow-300 text-yellow-700 text-sm rounded">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (currentAsset) {
                return (
                    <div className="space-y-2">
                        <div className="flex items-center justify-between">
                            <label className="block text-sm font-medium text-gray-700">{label}</label>
                            <button onClick={onRemove} className="text-xs text-red-500 hover:text-red-700">Remove</button>
                        </div>
                        <div className="relative">
                            <img src={currentAsset.dataUrl} alt={label} className="w-full rounded-lg border border-gray-200 max-h-40 object-contain bg-gray-50" />
                            {currentAsset.converted && (

                        onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}

        // ============================================
        // VIDEO UPLOADER (with validation)
        // ============================================
        function VideoUploader() {
            const assets = useProjectStore(s => s.assets);
            const [validation, setValidation] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);

            const handleVideoUpload = async (file) => {
                if (!file) return;
                setIsProcessing(true);

                // Validate video
                const result = validateVideo(file);
                setValidation(result);

                // If there are blocking errors, don't proceed
                if (result.errors.length > 0) {
                    setIsProcessing(false);
                    return;
                }

                // Read the file
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setAsset('video', {
                        name: file.name,
                        dataUrl: ev.target.result,
                        sizeMB: result.sizeMB,
                        warnings: result.warnings
                    });
                    setIsProcessing(false);
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="space-y-3">
                    <label className="block text-sm font-medium text-gray-700">Video File</label>

                    {assets.video ? (
                        <div className="space-y-2">
                            <div className="relative">
                                <video src={assets.video.dataUrl} className="w-full rounded-lg" controls />
                                <button onClick={() => { setAsset('video', null); setValidation(null); }} className="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1.5 hover:bg-red-600">✕</button>
                            </div>
                            <div className="flex items-center justify-between text-xs text-gray-500">
                                <span>{assets.video.name}</span>
                                <span>{assets.video.sizeMB?.toFixed(1)}MB</span>
                            </div>
                            {assets.video.warnings?.length > 0 && (
                                <div className="bg-yellow-50 border border-yellow-200 rounded p-2">
                                    {assets.video.warnings.map((w, i) => (
                                        <p key={i} className="text-xs text-yellow-700">⚠️ {w}</p>
                                    ))}
                                </div>
                            )}
                        </div>
                    ) : (
                        <>
                            <label className={`drop-zone block cursor-pointer ${isProcessing ? 'opacity-50' : ''}`}>
                                {isProcessing ? (
                                    <p className="text-sm text-gray-500">Processing video...</p>
                                ) : (
                                    <>
                                        <p className="text-sm text-gray-500">Drop video or click to upload</p>
                                        <p className="text-xs text-gray-400 mt-1">MP4 (H.264) • Max {VIDEO_SPECS.maxSizeMB}MB</p>
                                    </>
                                )}
                                <input
                                    type="file"
                                    accept="video/mp4,video/*"
                                    className="hidden"
                                    disabled={isProcessing}
                                    onChange={(e) => handleVideoUpload(e.target.files?.[0])}
                                />
                            </label>

                            {validation?.errors?.length > 0 && (
                                <div className="bg-red-50 border border-red-200 rounded p-2">
                                    {validation.errors.map((err, i) => (
                                        <p key={i} className="text-xs text-red-700">❌ {err}</p>
                                    ))}
                                </div>
                            )}

                            {validation?.warnings?.length > 0 && !validation?.errors?.length && (
                                <div className="bg-yellow-50 border border-yellow-200 rounded p-2">
                                    {validation.warnings.map((w, i) => (
                                        <p key={i} className="text-xs text-yellow-700">⚠️ {w}</p>
                                    ))}
                                </div>
                            )}
                        </>
                    )}

                    {/* Video Specs Info */}
                    <div className="bg-blue-50 border border-blue-100 rounded p-2 text-xs text-blue-700">
                        <p className="font-medium">Target Device Specs:</p>
                        <ul className="mt-1 space-y-0.5">

                            <li>• Max bitrate: {VIDEO_SPECS.maxBitrateMbps}Mbps</li>
                        </ul>
                    </div>
                </div>
            );
        }

        // ============================================
        // ISI EDITOR
        // ============================================
        function ISIEditor() {
            const isiContent = useProjectStore(s => s.isiContent);
            const assets = useProjectStore(s => s.assets);
            const config = useProjectStore(s => s.config);
            const [previewUrl, setPreviewUrl] = useState(null);

            const generateISI = () => {
                if (!isiContent.text.trim()) return;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const width = config.dimensions.width;
                const padding = 40;
                const lineHeight = isiContent.fontSize * isiContent.lineHeight;

                ctx.font = `${isiContent.fontSize}px ${isiContent.fontFamily}`;

                // Wrap text
                const words = isiContent.text.split(' ');
                const lines = [];
                let currentLine = '';

                for (const word of words) {
                    const testLine = currentLine ? `${currentLine} ${word}` : word;
                    if (ctx.measureText(testLine).width > width - padding * 2 && currentLine) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                }
                if (currentLine) lines.push(currentLine);

                const height = Math.max(lines.length * lineHeight + padding * 2, 500);
                canvas.width = width;
                canvas.height = height;

                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = 'black';
                ctx.font = `${isiContent.fontSize}px ${isiContent.fontFamily}`;

                let y = padding;
                for (const line of lines) {
                    ctx.fillText(line, padding, y + isiContent.fontSize);
                    y += lineHeight;
                }

                const dataUrl = canvas.toDataURL('image/png');
                setPreviewUrl(dataUrl);
                setAsset('isiImage', { dataUrl, dimensions: { width, height }, generated: true });
            };

            return (
                <div className="p-4 space-y-6">
                    <h2 className="text-lg font-semibold">ISI Content</h2>

                    <div className="flex gap-2">
                        <button onClick={() => setIsiContent({ mode: 'upload' })}
                            className={`flex-1 py-2 px-3 rounded-lg text-sm font-medium ${isiContent.mode === 'upload' ? 'bg-blue-100 text-blue-700 border-2 border-blue-500' : 'bg-gray-100 text-gray-600 border-2 border-transparent'}`}>
                            Upload Image
                        </button>
                        <button onClick={() => setIsiContent({ mode: 'generate' })}
                            className={`flex-1 py-2 px-3 rounded-lg text-sm font-medium ${isiContent.mode === 'generate' ? 'bg-blue-100 text-blue-700 border-2 border-blue-500' : 'bg-gray-100 text-gray-600 border-2 border-transparent'}`}>
                            Generate from Text
                        </button>
                    </div>

                    {isiContent.mode === 'upload' ? (
                        <p className="text-sm text-gray-500">Use the Assets panel to upload a pre-rendered ISI image.</p>
                    ) : (
                        <div className="space-y-4">
                            <div className="grid grid-cols-2 gap-3">
                                <div>

                                        <label className="block text-xs text-gray-600 mb-1">URL</label>
                                        <input

                                        <div>
                                            <label className="block text-xs text-gray-600 mb-1">Height</label>
                                            <input
                                                type="number"
                                                value={zone.height}

                                                className="w-full px-2 py-1 border border-gray-300 rounded text-sm"
                                            />
                                        </div>
                                    </div>

                                    <div className="text-xs text-gray-400 mt-1">
                                        {zone.inISI ? 'Position relative to ISI content' : 'Position relative to ad container'}

                        {zones.length === 0 && (
                            <div className="text-center py-8 text-gray-400">

        }

        // ============================================
        // ANIMATION TIMELINE (consolidated: frames + timing + presets + playback)
        // ============================================

        const ANIMATION_PRESETS = [
            { id: 'fade-in', label: 'Fade In', type: 'in', effects: { autoAlpha: { from: 0, to: 1 } }, easing: 'Power1.easeOut' },
            { id: 'fade-out', label: 'Fade Out', type: 'out', effects: { autoAlpha: { from: 1, to: 0 } }, easing: 'Power1.easeIn' },
            { id: 'slide-in-right', label: 'Slide In from Right', type: 'in', effects: { autoAlpha: { from: 0, to: 1 }, x: { from: '__W__', to: 0 } }, easing: 'Power2.easeOut' },
            { id: 'slide-out-left', label: 'Slide Out to Left', type: 'out', effects: { autoAlpha: { from: 1, to: 0 }, x: { from: 0, to: '-__W__' } }, easing: 'Power2.easeIn' },
            { id: 'slide-in-left', label: 'Slide In from Left', type: 'in', effects: { autoAlpha: { from: 0, to: 1 }, x: { from: '-__W__', to: 0 } }, easing: 'Power2.easeOut' },
            { id: 'slide-out-right', label: 'Slide Out to Right', type: 'out', effects: { autoAlpha: { from: 1, to: 0 }, x: { from: 0, to: '__W__' } }, easing: 'Power2.easeIn' },
            { id: 'slide-in-bottom', label: 'Slide In from Bottom', type: 'in', effects: { autoAlpha: { from: 0, to: 1 }, y: { from: '__H__', to: 0 } }, easing: 'Power2.easeOut' },
            { id: 'slide-up-out', label: 'Slide Up & Out', type: 'out', effects: { autoAlpha: { from: 1, to: 0 }, y: { from: 0, to: '-__H__' } }, easing: 'Power2.easeIn' },
            { id: 'rotate-r-to-l', label: 'Rotate 90° + Move R→L', type: 'out', effects: { autoAlpha: { from: 1, to: 0 }, x: { from: 0, to: '-__W__' }, rotation: { from: 0, to: -90 } }, easing: 'Power2.easeInOut' },
            { id: 'scale-in', label: 'Scale Up In', type: 'in', effects: { autoAlpha: { from: 0, to: 1 }, scale: { from: 0.5, to: 1 } }, easing: 'Back.easeOut' },
            { id: 'scale-out', label: 'Scale Down Out', type: 'out', effects: { autoAlpha: { from: 1, to: 0 }, scale: { from: 1, to: 0.5 } }, easing: 'Power1.easeIn' },
            { id: 'isi-slide-up', label: 'ISI Slide Up', type: 'in', forISI: true, effects: { autoAlpha: { from: 0, to: 1 }, y: { from: 200, to: 0 } }, easing: 'Power2.easeOut' },
            { id: 'isi-fade-in', label: 'ISI Fade In', type: 'in', forISI: true, effects: { autoAlpha: { from: 0, to: 1 } }, easing: 'Power1.easeOut' },
        ];

        const EASING_OPTIONS = [
            { value: 'none', label: 'Linear' },
            { value: 'Power1.easeOut', label: 'Ease Out' },
            { value: 'Power1.easeIn', label: 'Ease In' },
            { value: 'Power1.easeInOut', label: 'Ease In/Out' },
            { value: 'Power2.easeOut', label: 'Strong Ease Out' },
            { value: 'Power2.easeIn', label: 'Strong Ease In' },
            { value: 'Power2.easeInOut', label: 'Strong Ease In/Out' },
            { value: 'Back.easeOut', label: 'Back Out (overshoot)' },
            { value: 'Bounce.easeOut', label: 'Bounce Out' },
            { value: 'Elastic.easeOut', label: 'Elastic Out' },
        ];

        const EFFECT_TYPES = [
            { value: 'autoAlpha', label: 'Fade (autoAlpha)', step: 0.1 },
            { value: 'x', label: 'Move X (horizontal)', step: 1 },
            { value: 'y', label: 'Move Y (vertical)', step: 1 },
            { value: 'rotation', label: 'Rotate (degrees)', step: 1 },
            { value: 'scale', label: 'Scale', step: 0.1 },
        ];

        function AnimationTimeline() {
            const currentTemplate = useProjectStore(s => s.currentTemplate);
            const assets = useProjectStore(s => s.assets);
            const config = useProjectStore(s => s.config);
            const animations = useProjectStore(s => s.animations) || [];
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [expandedId, setExpandedId] = useState(null);
            const [showPresetFor, setShowPresetFor] = useState(null);
            const animationRef = useRef(null);

            if (!currentTemplate) return null;

            const hasISI = hasFeature(currentTemplate, 'isi');
            const frames = assets.frames || [];
            const adWidth = config.dimensions.width;
            const adHeight = config.dimensions.height;

            // Build target list
            const targets = frames.map((_, i) => ({ value: `frame${i + 1}`, label: `Frame ${i + 1}` }));
            if (hasISI) targets.push({ value: 'outerMostDiv', label: 'ISI Container' });

            // Animation helpers
            const addAnim = (anim) => {
                const id = 'anim-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
                setAnimations([...animations, { id, ...anim }]);
            };
            const updateAnim = (id, updates) => setAnimations(animations.map(a => a.id === id ? { ...a, ...updates } : a));
            const removeAnim = (id) => { setAnimations(animations.filter(a => a.id !== id)); setExpandedId(null); };

            const sorted = [...animations].sort((a, b) => a.startTime - b.startTime);
            const totalDuration = animations.reduce((max, a) => Math.max(max, a.startTime + a.duration), 0);

            // Resolve preset dimension placeholders
            const resolveVal = (v) => {
                if (typeof v !== 'string') return v;
                if (v === '__W__') return adWidth;
                if (v === '-__W__') return -adWidth;
                if (v === '__H__') return adHeight;
                if (v === '-__H__') return -adHeight;
                return parseFloat(v) || 0;
            };
            const resolveEffects = (effects) => {
                const r = {};
                for (const [k, v] of Object.entries(effects)) r[k] = { from: resolveVal(v.from), to: resolveVal(v.to) };
                return r;
            };

            // Auto-generate default fade in/out for all frames
            const autoGenerateFades = () => {
                const dur = config.frameDuration || 0.5;
                const delay = config.frameDelay || 1;
                const anims = [];
                let t = 0;
                for (let i = 0; i < frames.length; i++) {
                    const target = `frame${i + 1}`;
                    anims.push({ id: `auto-in-${i}`, target, type: 'in', effects: { autoAlpha: { from: 0, to: 1 } }, duration: dur, startTime: t, easing: 'Power1.easeOut' });
                    t += dur + delay;
                    if (i < frames.length - 1) {
                        anims.push({ id: `auto-out-${i}`, target, type: 'out', effects: { autoAlpha: { from: 1, to: 0 } }, duration: dur, startTime: t, easing: 'Power1.easeIn' });
                        t += dur;
                    }
                }
                setAnimations(anims);
            };

            const addFromPreset = (preset, target) => {
                const last = sorted[sorted.length - 1];
                const nextStart = last ? last.startTime + last.duration : 0;
                addAnim({ target, type: preset.type, effects: resolveEffects(preset.effects), duration: config.frameDuration || 0.5, startTime: nextStart, easing: preset.easing });
                setShowPresetFor(null);
            };

            const handleEffectToggle = (animId, key, enabled, anim) => {
                const effects = { ...anim.effects };
                if (enabled) {
                    const defaults = { autoAlpha: { from: 0, to: 1 }, x: { from: 0, to: 0 }, y: { from: 0, to: 0 }, rotation: { from: 0, to: 0 }, scale: { from: 1, to: 1 } };
                    effects[key] = defaults[key];
                } else { delete effects[key]; }
                updateAnim(animId, { effects });
            };

            const handleEffectValue = (animId, key, prop, val, anim) => {
                const effects = { ...anim.effects };
                effects[key] = { ...effects[key], [prop]: parseFloat(val) || 0 };
                updateAnim(animId, { effects });
            };

            // Playback
            const { frameDuration, frameDelay } = config;
            const playbackDuration = totalDuration || frames.length * (frameDuration + frameDelay);
            useEffect(() => {
                if (isPlaying && playbackDuration > 0) {
                    const startTs = Date.now() - (currentTime * 1000);
                    const tick = () => {
                        const elapsed = (Date.now() - startTs) / 1000;
                        if (elapsed >= playbackDuration) {
                            setCurrentTime(0);
                            setIsPlaying(false);
                            return;
                        }
                        setCurrentTime(elapsed);
                        animationRef.current = requestAnimationFrame(tick);
                    };
                    animationRef.current = requestAnimationFrame(tick);
                    return () => cancelAnimationFrame(animationRef.current);
                }
            }, [isPlaying, playbackDuration]);

            return (
                <div className="p-4 space-y-4">
                    {/* ---- FRAME UPLOADS ---- */}
                    <div className="space-y-3">
                        <div className="flex items-center justify-between">
                            <h2 className="text-lg font-semibold">Animation Frames</h2>
                            <span className="text-xs text-gray-500">{frames.length} frame(s)</span>
                        </div>
                        {frames.map((frame, i) => (
                            <AssetUploader
                                key={i}
                                label={`Frame ${i + 1}`}
                                currentAsset={frame}
                                onUpload={(result) => { const f = [...frames]; f[i] = result; setAsset('frames', f); }}
                                onRemove={() => setAsset('frames', frames.filter((_, idx) => idx !== i))}
                            />
                        ))}
                        <button
                            onClick={() => setAsset('frames', [...frames, null])}
                            className="w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-gray-500 hover:border-blue-400 hover:text-blue-600 text-sm"
                        >+ Add Frame</button>
                    </div>

                    {/* ---- DEFAULT TIMING ---- */}
                    {frames.length > 0 && (
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">Default Duration (s)</label>
                                <input type="number" value={config.frameDuration} onChange={(e) => updateConfig('frameDuration', parseFloat(e.target.value) || 0.5)}
                                    className="w-full px-2 py-1.5 border border-gray-300 rounded text-sm" min="0.1" max="5" step="0.1" />
                                <p className="text-xs text-gray-400 mt-0.5">Tween length</p>
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">Default Delay (s)</label>
                                <input type="number" value={config.frameDelay} onChange={(e) => updateConfig('frameDelay', parseFloat(e.target.value) || 1)}
                                    className="w-full px-2 py-1.5 border border-gray-300 rounded text-sm" min="0.5" max="10" step="0.5" />
                                <p className="text-xs text-gray-400 mt-0.5">Between frames</p>
                            </div>
                        </div>
                    )}

                    <hr className="border-gray-200" />

                    {/* ---- TIMELINE HEADER ---- */}
                    <div className="flex items-center justify-between">
                        <h2 className="text-lg font-semibold">Timeline</h2>
                        {totalDuration > 0 && <span className="text-xs bg-gray-100 px-2 py-1 rounded text-gray-500">{totalDuration.toFixed(1)}s</span>}
                    </div>

                    {/* ---- QUICK ACTIONS ---- */}
                    <div className="flex gap-2">
                        {frames.length > 0 && (
                            <button onClick={autoGenerateFades} className="flex-1 px-3 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg">Auto-Generate Fades</button>
                        )}
                        <button
                            onClick={() => { const t = targets[0]?.value || 'frame1'; const last = sorted[sorted.length-1]; addAnim({ target: t, type: 'in', effects: { autoAlpha: { from: 0, to: 1 } }, duration: config.frameDuration || 0.5, startTime: last ? last.startTime + last.duration : 0, easing: 'Power1.easeOut' }); }}
                            disabled={targets.length === 0}
                            className="flex-1 px-3 py-2 text-sm bg-blue-600 text-white hover:bg-blue-700 rounded-lg disabled:opacity-50"
                        >+ Add Step</button>
                    </div>

                    {/* ---- PRESET PICKER ---- */}
                    {targets.length > 0 && (
                        <div className="space-y-1">
                            <label className="block text-xs text-gray-500 font-medium">Add from preset:</label>
                            <div className="flex flex-wrap gap-1">
                                {targets.map(t => (
                                    <button key={t.value} onClick={() => setShowPresetFor(showPresetFor === t.value ? null : t.value)}
                                        className={`px-2 py-1 text-xs rounded border ${showPresetFor === t.value ? 'bg-blue-100 border-blue-400 text-blue-700' : 'bg-white border-gray-300 text-gray-600 hover:border-blue-300'}`}
                                    >{t.label}</button>
                                ))}
                            </div>
                            {showPresetFor && (
                                <div className="bg-gray-50 border border-gray-200 rounded-lg p-2 space-y-0.5">
                                    {ANIMATION_PRESETS
                                        .filter(p => showPresetFor.startsWith('outer') ? (p.forISI || p.id.startsWith('fade')) : !p.forISI)
                                        .map(preset => (
                                            <button key={preset.id} onClick={() => addFromPreset(preset, showPresetFor)}
                                                className="w-full text-left px-2 py-1.5 text-sm hover:bg-blue-50 rounded flex items-center gap-2"
                                            >
                                                <span className={`w-1.5 h-1.5 rounded-full ${preset.type === 'in' ? 'bg-green-500' : 'bg-red-500'}`} />
                                                {preset.label}
                                            </button>
                                        ))}
                                </div>
                            )}
                        </div>
                    )}

                    {targets.length === 0 && (
                        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                            <p className="text-sm text-amber-700">Add animation frames above to start building your timeline.</p>
                        </div>
                    )}

                    {/* ---- VISUAL TIMELINE BAR ---- */}
                    {animations.length > 0 && totalDuration > 0 && (
                        <div className="bg-gray-900 rounded-lg p-3 space-y-1">
                            <div className="flex justify-between text-xs text-gray-400 mb-1">
                                <span>0s</span><span>{totalDuration.toFixed(1)}s</span>
                            </div>
                            {targets.map(t => {
                                const ta = sorted.filter(a => a.target === t.value);
                                if (ta.length === 0) return null;
                                return (
                                    <div key={t.value} className="flex items-center gap-2">
                                        <span className="text-xs text-gray-400 w-16 truncate">{t.label}</span>
                                        <div className="flex-1 h-5 bg-gray-800 rounded relative">
                                            {ta.map(a => {
                                                const left = (a.startTime / totalDuration) * 100;
                                                const w = Math.max((a.duration / totalDuration) * 100, 1);
                                                const hasMove = a.effects.x || a.effects.y;
                                                const hasRot = a.effects.rotation;
                                                let bg = a.type === 'in' ? 'bg-green-500' : 'bg-red-500';
                                                if (hasMove) bg = a.type === 'in' ? 'bg-blue-500' : 'bg-orange-500';
                                                if (hasRot) bg = 'bg-purple-500';
                                                return (
                                                    <div key={a.id} onClick={() => setExpandedId(expandedId === a.id ? null : a.id)}
                                                        className={`absolute h-full rounded cursor-pointer ${bg} bg-opacity-80 ${expandedId === a.id ? 'ring-2 ring-white' : ''}`}
                                                        style={{ left: `${left}%`, width: `${w}%` }}
                                                        title={`${t.label} ${a.type} @${a.startTime}s (${a.duration}s)`}
                                                    />
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                            {/* Playhead on timeline */}
                            {isPlaying && totalDuration > 0 && (
                                <div className="relative h-0">
                                    <div className="absolute w-0.5 bg-red-500 -top-1" style={{ left: `calc(4rem + ${(currentTime / totalDuration) * 100}% * 0.82)`, height: '100%' }} />
                                </div>
                            )}
                            <div className="flex flex-wrap gap-3 mt-1">
                                <span className="flex items-center gap-1 text-xs text-gray-400"><span className="w-2 h-2 rounded bg-green-500" /> Fade In</span>
                                <span className="flex items-center gap-1 text-xs text-gray-400"><span className="w-2 h-2 rounded bg-red-500" /> Fade Out</span>

        // ============================================

        const DEVICE_PRESETS = [
            { id: 'none', name: 'No Frame', bezel: 0 },

            { id: 'mw22', name: 'MW22 Wallboard', bezel: 30, color: '#2d2d2d' },
            { id: 'mw15', name: 'MW15 Wallboard', bezel: 25, color: '#333333' },

        function DeviceSimulator({ children, dimensions }) {

        // ============================================
        // CODE GENERATOR
        // ============================================
        function generateHTML(template, config, assets, animations) {
            const hasISI = hasFeature(template, 'isi');
            const hasAnimation = hasFeature(template, 'animation');
            const hasVideo = hasFeature(template, 'video');
            const buttonCount = config.buttonCount || 0;
            const clickZones = config.clickZones || [];
            const anims = animations || [];

            // Generate frame HTML for animated templates
            const frames = assets.frames || [];
            let framesHTML = '';
            if (hasAnimation && frames.length > 0) {
                framesHTML = frames.map((_, i) => `
        <div id="frame${i + 1}">
            <img src="assets/frame${i + 1}.png" width="${config.dimensions.width}">
        </div>`).join('');
            }

            // Generate button HTML
            const buttonsHTML = hasVideo && buttonCount > 0 ?
                Array.from({ length: buttonCount }, (_, i) => {
                    const btn = config.buttons[i] || {};
                    return `<div id="ctaButton${i + 1}" class="cta-button">${btn.text || `Button ${i + 1}`}</div>`;
                }).join('\n        ') : '';

            // Generate click zone HTML - non-ISI zones (go in container)
            const containerZonesHTML = clickZones
                .filter(z => !z.inISI)
                .map(z => `<div id="${z.id}" class="click-zone"></div>`)
                .join('\n        ');

            // Generate click zone HTML - ISI zones (go in innerMostDiv)
            const isiZonesHTML = clickZones
                .filter(z => z.inISI)
                .map(z => `<div id="${z.id}" class="click-zone"></div>`)
                .join('\n                ');

            const hasClickZones = clickZones.length > 0;

            // Generate animation JS
            const animationScript = generateAnimationJS(anims);

            return `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="ad.size" content="width=${config.dimensions.width},height=${config.dimensions.height}">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Ad</title>
       <script>var appHost = null; try { appHost = window.appHost = window.top.AppHost ? new window.top.AppHost(this) : null; } catch(e) { window.appHost = null; }<\/script>
        <script src="https://code.jquery.com/jquery-2.1.4.min.js"><\/script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.0.1/TweenMax.min.js"><\/script>
    <link rel="stylesheet" href="css/main.css">
    ${hasISI ? `<link rel="stylesheet" href="css/scroller.css">` : ''}
    ${hasClickZones ? `<link rel="stylesheet" href="css/clicks.css">` : ''}
    ${hasVideo && buttonCount > 0 ? `<link rel="stylesheet" href="css/buttons.css">` : ''}
</head>
<body>
    <div id="container">
        ${!hasVideo ? `<img class="background" src="assets/background.png" width="${config.dimensions.width}px">` : ''}

        ${containerZonesHTML}
        ${hasISI ? `
        <div id="outerMostDiv">

                <img id="ISI_guts" src="assets/isi.png" width="${config.isiWidth || config.dimensions.width}px">
                ${isiZonesHTML}
            </div>
            <div id="isi-controls"></div>
        </div>` : ''}
        ${hasVideo ? `<video id="videoId" autoplay><source src="assets/video.mp4" type="video/mp4" /></video>` : ''}
        ${buttonsHTML}
    </div>
    <script src="script/ad.js"><\/script>

</body>
</html>`;
        }

        // Generate TweenMax animation JS from animation data array
        function generateAnimationJS(animations) {
            if (!animations || animations.length === 0) return '';

            const sorted = [...animations].sort((a, b) => a.startTime - b.startTime);
            const setLines = [];
            const toLines = [];
            const initialized = new Set();

            for (const anim of sorted) {
                const sel = '"#' + anim.target + '"';
                const props = {};
                const initProps = {};

                if (anim.effects.autoAlpha !== undefined) { props.autoAlpha = anim.effects.autoAlpha.to; initProps.autoAlpha = anim.effects.autoAlpha.from; }
                if (anim.effects.x !== undefined) { props.x = anim.effects.x.to; initProps.x = anim.effects.x.from; }
                if (anim.effects.y !== undefined) { props.y = anim.effects.y.to; initProps.y = anim.effects.y.from; }
                if (anim.effects.rotation !== undefined) { props.rotation = anim.effects.rotation.to; initProps.rotation = anim.effects.rotation.from; }
                if (anim.effects.scale !== undefined) { props.scale = anim.effects.scale.to; initProps.scale = anim.effects.scale.from; }
                if (anim.easing && anim.easing !== 'none') props.ease = anim.easing;

                if (!initialized.has(anim.target) && Object.keys(initProps).length > 0) {
                    initialized.add(anim.target);
                    setLines.push('    TweenMax.set(' + sel + ', ' + formatAnimProps(initProps) + ');');
                }

                const label = anim.target.replace(/([a-z])(\d)/, '$1 $2').toUpperCase() + ' - ' + (anim.type === 'in' ? 'IN' : 'OUT');
                toLines.push('    //' + label);
                toLines.push('    tl.to(' + sel + ', ' + anim.duration + ', ' + formatAnimProps(props) + ', ' + anim.startTime + ');');
            }

            return `
var firstPlay = true;
var tl = new TimelineMax({});
function createAnimation() {
${setLines.join('\n')}
${toLines.join('\n')}
}
function onWallboardIdleSlideDisplay() {
    var el = document.getElementById("innerMostDiv");
    if (el) el.scrollTop = 0;
    if (firstPlay) { createAnimation(); tl.play(); firstPlay = false; }
    else { tl.seek(0); tl.play(); }
}
if (typeof appHost === 'undefined' || !appHost) { onWallboardIdleSlideDisplay(); }
window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'replayAnimation') {
        if (firstPlay) { createAnimation(); firstPlay = false; }
        tl.restart();
    }
});
`;
        }

        function formatAnimProps(props) {
            const parts = Object.entries(props).map(function(entry) {
                var k = entry[0], v = entry[1];
                if (k === 'ease') return k + ': ' + v;
                if (typeof v === 'string') return k + ': "' + v + '"';
                return k + ': ' + v;
            });
            return '{ ' + parts.join(', ') + ' }';
        }

        function generateAdJS(config) {
            const buttonCount = config.buttonCount || 0;
            const clickZones = config.clickZones || [];

            // Generate button click handler code
            let buttonHandlers = '';
            if (buttonCount > 0) {
                for (let i = 0; i < buttonCount; i++) {
                    // Buttons 1 & 2 use clickTag1, buttons 3 & 4 use clickTag2
                    const clickTag = i < 2 ? 'clickTag1' : 'clickTag2';
                    buttonHandlers += `
    var btn${i + 1} = document.getElementById('ctaButton${i + 1}');
    if (btn${i + 1}) btn${i + 1}.onclick = function() { openLink(${clickTag}); };`;
                }
            }

            // Generate click zone handlers
            let zoneHandlers = '';
            clickZones.forEach((zone, i) => {
                const varName = zone.id.replace(/[^a-zA-Z0-9]/g, '_');
                zoneHandlers += `
    var ${varName} = document.getElementById('${zone.id}');
    if (${varName}) ${varName}.onclick = function() { openLink('${zone.url}'); };`;
            });

            return `// Click Zone URLs
${clickZones.map(z => `var ${z.id.replace(/[^a-zA-Z0-9]/g, '_')}_url = "${z.url}";`).join('\n')}

function openLink(url) {
    if (typeof appHost !== 'undefined' && appHost) {
        appHost.requestFullscreenBrowserView(url);
    } else {
        window.open(url);
    }
}

document.addEventListener('DOMContentLoaded', function() {
${zoneHandlers}
${buttonHandlers}
});`;
        }

        function generateCSS(config) {
            return `* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; }
#container { position: absolute; width: ${config.dimensions.width}px; height: ${config.dimensions.height}px; overflow: hidden; background: white;}
.background { position: absolute; top: 0; left: 0; }
#clickTag1 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; }
[id^="frame"] { position: absolute; top: 0; left: 0; visibility: hidden; opacity: 0; }
#outerMostDiv { position: absolute; bottom: 0; left: 0; width: 100%; height: 540px; background: white; overflow: hidden; }
#innerMostDiv { position: absolute; width: 100%; overflow-y: auto; }`;

            const scrollerBorderRadius = config.scrollerBorderRadius || 50;
            const scrollerTrackColor = config.scrollerTrackColor || '#b8bebc';
            const scrollerTrackWidth = config.scrollerTrackWidth || 12;

            return `/* Scroller CSS for ISI */
#outerMostDiv {
    position: absolute;

    width: ${isiWidth}px;
    left: ${isiLeft}px;

        function generateButtonsCSS(config) {
            const buttonCount = config.buttonCount || 0;
            if (buttonCount === 0) return '';

            let css = `/* Button Styles */
.cta-button {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: Arial, sans-serif;

.cta-button:hover {

}

`;
            // Generate CSS for each button
            for (let i = 0; i < buttonCount; i++) {
                const btn = config.buttons[i] || {};
                css += `#ctaButton${i + 1} {

    border-radius: ${btn.borderRadius || 4}px;

        function generateClicksCSS(config) {
            const clickZones = config.clickZones || [];
            if (clickZones.length === 0) return '';

            let css = `/* Click Zone Styles */
.click-zone {
    position: absolute;

`;
            // Generate CSS for each zone
            clickZones.forEach(zone => {
                css += `#${zone.id} {

            return css;
        }

        function generateMainJS(config) {
            const scrollStep = config.scrollStep || 5;
            const autoScrollSpeed = config.autoScrollSpeed || 80;
            return `var _loadedImages = 0,
    _tl = new TimelineMax({delay: 0}),
    _isiText = document.getElementById('innerMostDiv'),
    _container = document.getElementById('outerMostDiv'),
    _isiControls = document.getElementById('isi-controls'),
    _scrollerBeingDragged = false,
    _scroller, _scrollerbg, _scrollerline, _arrowUp, _arrowDown,
    _normalizedPosition,
    _topPosition,
    _contentPosition = 0,
    _percentY,
    autoScroll,
    autoScrollSpeed = ${autoScrollSpeed},
    scrollStep = ${scrollStep},
    _textScrollHeight,
    intervalRewind;

function init2() {
    createScroll(false, true);
}

function createScroll(hasArrows, hasScroller) {
    hasArrows = typeof hasArrows !== 'undefined' ? hasArrows : true;
    hasScroller = typeof hasScroller !== 'undefined' ? hasScroller : true;

    if (hasArrows) {
        _arrowUp = document.createElement("div");
        _arrowUp.id = 'arrowUp';
        _arrowUp.className = 'retina';
        _isiControls.appendChild(_arrowUp);
    }

    if (hasScroller) {
        _scrollerline = document.createElement("div");
        _scrollerline.className = hasArrows ? 'isiLineWithArrows' : 'isiLineNoArrows';
        _isiControls.appendChild(_scrollerline);

        _scroller = document.createElement("div");
        _scrollerbg = document.createElement("div");
        _scroller.className = 'scroller';
        _scrollerbg.className = 'scrollerbg';
        _scrollerline.appendChild(_scroller);
        _scrollerline.appendChild(_scrollerbg);
    }

    if (hasArrows) {
        _arrowDown = document.createElement("div");
        _arrowDown.id = 'arrowDown';
        _arrowDown.className = 'retina';
        _isiControls.appendChild(_arrowDown);
    }

    if (hasScroller) {
        _isiText.addEventListener('scroll', moveScroller);
        _scroller.addEventListener('mousedown', startDrag);
        _scrollerbg.addEventListener('mousedown', startDrag);
        _scrollerline.addEventListener('click', seekTo);
        window.addEventListener('mousemove', scrollBarScroll);
    }

    if (hasArrows) {
        _arrowUp.addEventListener('mousedown', scrollUp);
        _arrowDown.addEventListener('mousedown', scrollDown);
        _arrowUp.addEventListener('mouseup', scrollStop);
        _arrowDown.addEventListener('mouseup', scrollStop);
    }

    _isiText.addEventListener('wheel', isiWheel);
    window.addEventListener('mouseup', stopDrag);
}

function seekTo(evt) {
    var normalPosition = (evt.pageY - _isiControls.offsetParent.offsetTop - _scrollerline.offsetTop) / _scrollerline.clientHeight;
    _textScrollHeight = _isiText.scrollHeight - _container.offsetHeight;
    _isiText.scrollTop = normalPosition * _textScrollHeight;
    clearIntervalFunct();
}

function startDrag(evt) {
    _normalizedPosition = evt.pageY - _scrollerline.scrollTop;
    _contentPosition = _isiText.scrollTop;
    _scrollerBeingDragged = true;
    clearIntervalFunct();
}

function stopDrag(evt) {
    if (typeof buttonPress != 'undefined' && buttonPress) clearInterval(buttonPress);
    _scrollerBeingDragged = false;
}

function scrollBarScroll(evt) {
    evt.preventDefault();
    if (_scrollerBeingDragged === true) {
        var mouseDifferential = evt.pageY - _normalizedPosition;
        var scrollEquivalent = mouseDifferential * (_isiText.scrollHeight / _scrollerline.clientHeight);
        _isiText.scrollTop = _contentPosition + scrollEquivalent;
    }
}

function moveScroller(evt) {
    evt.preventDefault();
    _textScrollHeight = _isiText.scrollHeight - _container.offsetHeight;
    var remainOffsetHeight = _textScrollHeight - _isiText.scrollTop;
    var percentHeight = 1 - remainOffsetHeight / _textScrollHeight;
    _scroller.style.top = Math.abs((_scrollerline.offsetHeight - _scroller.offsetHeight) * percentHeight) + 'px';
    _scrollerbg.style.top = Math.abs((_scrollerline.offsetHeight - _scrollerbg.offsetHeight) * percentHeight) + 'px';
}

function isiWheel(evt) {
    clearIntervalFunct();
}

function scrollUp() {
    clearIntervalFunct();
    buttonPress = setInterval(function() { _isiText.scrollTop -= scrollStep; }, 100);
}

function scrollDown() {
    clearIntervalFunct();
    buttonPress = setInterval(function() { _isiText.scrollTop += scrollStep; }, 100);
}

function scrollStop() {
    _tl.kill(null, _isiText);
}

function clearIntervalFunct() {
    _tl.kill(null, _isiText);
}

$(document).ready(function() {
    init2();
});`;
        }
