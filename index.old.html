        // ============================================
        // VALIDATION REPORT
        // ============================================
        function ValidationReport() {
            const currentTemplate = useProjectStore(s => s.currentTemplate);
            const config = useProjectStore(s => s.config);
            const assets = useProjectStore(s => s.assets);

            const runValidation = () => {
                const issues = [];

                if (!currentTemplate) {
                    return [{ type: 'error', category: 'Template', message: 'No template selected' }];
                }

                // Check required assets
                const requiredAssets = currentTemplate.requiredAssets || [];

                if (requiredAssets.includes('background')) {
                    if (!assets.background) {
                        issues.push({ type: 'error', category: 'Assets', message: 'Background image is required' });
                    } else {
                        // Check dimensions
                        const { width, height } = assets.background.dimensions || {};
                        if (width !== currentTemplate.dimensions.width || height !== currentTemplate.dimensions.height) {
                            issues.push({
                                type: 'warning',
                                category: 'Assets',
                                message: `Background dimensions (${width}x${height}) don't match template (${currentTemplate.dimensions.width}x${currentTemplate.dimensions.height})`
                            });
                        }
                    }
                }

                if (requiredAssets.includes('isiImage') && !assets.isiImage) {
                    issues.push({ type: 'error', category: 'Assets', message: 'ISI image is required' });
                }

                if (requiredAssets.includes('video') && !assets.video) {
                    issues.push({ type: 'error', category: 'Assets', message: 'Video file is required' });
                }

                if (requiredAssets.includes('frames')) {
                    const validFrames = (assets.frames || []).filter(f => f !== null);
                    if (validFrames.length === 0) {
                        issues.push({ type: 'error', category: 'Assets', message: 'At least one animation frame is required' });
                    } else if (validFrames.length < 2) {
                        issues.push({ type: 'warning', category: 'Assets', message: 'Consider adding more frames for smoother animation' });
                    }
                }

                // Check clickTags
                const failsafeUrl = 'failsafe-page';
                if (config.clickTag1.includes(failsafeUrl)) {
                    issues.push({ type: 'warning', category: 'Config', message: 'ClickTag1 is using default failsafe URL' });
                }
                if (config.clickTag2.includes(failsafeUrl)) {
                    issues.push({ type: 'info', category: 'Config', message: 'ClickTag2 is using default failsafe URL' });
                }

                // Check URL formats
                ['clickTag1', 'clickTag2', 'clickTag3', 'clickTag4'].forEach((tag, i) => {
                    const url = config[tag];
                    if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
                        issues.push({ type: 'warning', category: 'Config', message: `ClickTag${i+1} should start with http:// or https://` });
                    }
                });

                // Check video warnings
                if (assets.video?.warnings?.length > 0) {
                    assets.video.warnings.forEach(w => {
                        issues.push({ type: 'warning', category: 'Video', message: w });
                    });
                }

                // Animation checks
                if (hasFeature(currentTemplate, 'animation')) {
                    if (config.frameDuration < 0.3) {
                        issues.push({ type: 'warning', category: 'Animation', message: 'Frame duration is very short, may appear too fast' });
                    }
                    if (config.frameDuration > 3) {
                        issues.push({ type: 'info', category: 'Animation', message: 'Frame duration is quite long' });
                    }
                }

                // All good!
                if (issues.length === 0) {
                    issues.push({ type: 'success', category: 'Status', message: 'All checks passed! Ready to export.' });
                }

                return issues;
            };

            const issues = runValidation();
            const errorCount = issues.filter(i => i.type === 'error').length;
            const warningCount = issues.filter(i => i.type === 'warning').length;
            const canExport = errorCount === 0;

            const iconMap = {
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️',
                success: '✅'
            };

            const bgMap = {
                error: 'bg-red-50 border-red-200 text-red-800',
                warning: 'bg-yellow-50 border-yellow-200 text-yellow-800',
                info: 'bg-blue-50 border-blue-200 text-blue-800',
                success: 'bg-green-50 border-green-200 text-green-800'
            };

            // Group by category
            const groupedIssues = issues.reduce((acc, issue) => {
                if (!acc[issue.category]) acc[issue.category] = [];
                acc[issue.category].push(issue);
                return acc;
            }, {});

            return (
                <div className="p-4 space-y-4">
                    <h2 className="text-lg font-semibold">Validation Report</h2>

                    {/* Summary */}
                    <div className={`rounded-lg p-4 ${canExport ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}`}>
                        <div className="flex items-center gap-3">
                            <span className="text-2xl">{canExport ? '✅' : '❌'}</span>
                            <div>
                                <p className={`font-medium ${canExport ? 'text-green-800' : 'text-red-800'}`}>
                                    {canExport ? 'Ready to Export' : 'Issues Found'}
                                </p>
                                <p className="text-sm text-gray-600">
                                    {errorCount > 0 && <span className="text-red-600">{errorCount} error{errorCount !== 1 ? 's' : ''}</span>}
                                    {errorCount > 0 && warningCount > 0 && ' • '}
                                    {warningCount > 0 && <span className="text-yellow-600">{warningCount} warning{warningCount !== 1 ? 's' : ''}</span>}
                                    {errorCount === 0 && warningCount === 0 && <span className="text-green-600">No issues</span>}
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* Grouped Issues */}
                    {Object.entries(groupedIssues).map(([category, categoryIssues]) => (
                        <div key={category} className="space-y-2">
                            <h4 className="text-sm font-medium text-gray-700">{category}</h4>
                            {categoryIssues.map((issue, i) => (
                                <div key={i} className={`flex items-start gap-2 p-2 rounded border text-sm ${bgMap[issue.type]}`}>
                                    <span>{iconMap[issue.type]}</span>
                                    <span>{issue.message}</span>
                                </div>
                            ))}
                        </div>
                    ))}

                    {/* Export Button */}
                    <div className="pt-4 border-t">
                        <button
                            onClick={exportZip}
                            disabled={!canExport}
                            className={`w-full py-3 rounded-lg font-medium transition-colors ${canExport ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-gray-200 text-gray-500 cursor-not-allowed'}`}
                        >
                            {canExport ? 'Export Ad Package' : 'Fix Errors to Export'}
                        </button>
                    </div>

                    {/* Checklist */}
                    <div className="bg-gray-50 rounded-lg p-3 text-xs text-gray-600">
                        <p className="font-medium mb-2">Pre-export Checklist:</p>
                        <ul className="space-y-1">
                            <li className="flex items-center gap-2">
                                <span>{assets.background || assets.video ? '✓' : '○'}</span>
                                <span>Main asset uploaded</span>
                            </li>
                            <li className="flex items-center gap-2">
                                <span>{!config.clickTag1.includes('failsafe') ? '✓' : '○'}</span>
                                <span>ClickTags configured</span>
                            </li>
                            {hasFeature(currentTemplate, 'isi') && (
                                <li className="flex items-center gap-2">
                                    <span>{assets.isiImage ? '✓' : '○'}</span>
                                    <span>ISI content added</span>
                                </li>
                            )}
                            {hasFeature(currentTemplate, 'animation') && (
                                <li className="flex items-center gap-2">
                                    <span>{(assets.frames?.filter(f => f).length || 0) >= 2 ? '✓' : '○'}</span>
                                    <span>Animation frames uploaded</span>
                                </li>
                            )}
                        </ul>
                    </div>
                </div>
            );
        }

        // ============================================
        // PREVIEW
        // ============================================
        function PreviewIframe() {
            const currentTemplate = useProjectStore(s => s.currentTemplate);
            const config = useProjectStore(s => s.config);
            const assets = useProjectStore(s => s.assets);
            const animations = useProjectStore(s => s.animations) || [];
            const animationReplayCount = useProjectStore(s => s.animationReplayCount) || 0;
            const [scale, setScale] = useState(0.4);
            const [key, setKey] = useState(0);

            // ISI drag/resize state (must be before any conditional returns)
            const [isiSelected, setIsiSelected] = useState(false);
            const [isDragging, setIsDragging] = useState(false);
            const [resizeMode, setResizeMode] = useState(null); // 'top', 'left', 'right', 'bottom-right', etc.
            const [dragStart, setDragStart] = useState({ x: 0, y: 0, isiTop: 0, isiHeight: 0, isiWidth: 0, isiLeft: 0 });

            // Click zone drag/resize state
            const [selectedZoneIndex, setSelectedZoneIndex] = useState(null);
            const [isZoneDragging, setIsZoneDragging] = useState(false);
            const [zoneResizeMode, setZoneResizeMode] = useState(null);
            const [zoneDragStart, setZoneDragStart] = useState({ x: 0, y: 0, top: 0, left: 0, width: 0, height: 0 });
            // Track drag offset separately to avoid updating config during drag (which resets iframe scroll)
            const [zoneDragOffset, setZoneDragOffset] = useState({ top: 0, left: 0, width: 0, height: 0 });

            // Ref for the preview container
            const containerRef = useRef(null);

            // Send replay message to iframe when triggered
            useEffect(() => {
                if (animationReplayCount > 0 && iframeRef.current && iframeRef.current.contentWindow) {
                    iframeRef.current.contentWindow.postMessage({ type: 'replayAnimation' }, '*');
                }
            }, [animationReplayCount]);

            // Reset selection if selected zone no longer exists
            useEffect(() => {
                const zones = config.clickZones || [];
                if (selectedZoneIndex !== null && selectedZoneIndex >= zones.length) {
                    setSelectedZoneIndex(null);
                }
            }, [config.clickZones, selectedZoneIndex]);

            // Track ISI scroll position to preserve across re-renders
            const isiScrollPosRef = useRef(0);
            const iframeRef = useRef(null);

            // Listen for position updates from iframe (ISI zone dragging)
            useEffect(() => {
                const handleMessage = (e) => {
                    if (e.data && e.data.type === 'zonePositionUpdate') {
                        const { zoneIndex, top, left, width, height } = e.data;
                        const zones = config.clickZones || [];
                        if (zones[zoneIndex]) {
                            // Save current scroll position before update
                            try {
                                const iframe = iframeRef.current;
                                if (iframe && iframe.contentWindow) {
                                    const innerDiv = iframe.contentWindow.document.getElementById('innerMostDiv');
                                    if (innerDiv) {
                                        isiScrollPosRef.current = innerDiv.scrollTop;
                                    }
                                }
                            } catch (err) {}

                            const updated = {
                                ...zones[zoneIndex],
                                top: Math.round(top),
                                left: Math.round(left)
                            };
                            if (width !== undefined) updated.width = Math.round(width);
                            if (height !== undefined) updated.height = Math.round(height);
                            const newZones = [...zones];
                            newZones[zoneIndex] = updated;
                            updateConfig('clickZones', newZones);
                        }
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, [config.clickZones]);

            // Restore ISI scroll position after iframe loads
            const handleIframeLoad = () => {
                if (isiScrollPosRef.current > 0) {
                    try {
                        const iframe = iframeRef.current;
                        if (iframe && iframe.contentWindow) {
                            const innerDiv = iframe.contentWindow.document.getElementById('innerMostDiv');
                            if (innerDiv) {
                                innerDiv.scrollTop = isiScrollPosRef.current;
                            }
                        }
                    } catch (err) {}
                }
            };

            const previewHTML = useMemo(() => {
                if (!currentTemplate) return '';

                const hasISI = hasFeature(currentTemplate, 'isi');
                const hasVideo = hasFeature(currentTemplate, 'video');
                const hasButtons = hasVideo && config.buttonCount > 0;

                let html = generateHTML(currentTemplate, config, assets, animations);
                const css = generateCSS(config);
                const js = generateAdJS(config);

                // Inline main CSS
                html = html.replace('<link rel="stylesheet" href="css/main.css">', `<style>${css}</style>`);

                // Inline scroller CSS for ISI templates
                if (hasISI) {
                    const scrollerCss = generateScrollerCSS(config);
                    html = html.replace('<link rel="stylesheet" href="css/scroller.css">', `<style>${scrollerCss}</style>`);
                }

                // Inline buttons CSS for video templates with buttons
                if (hasButtons) {
                    const buttonsCss = generateButtonsCSS(config);
                    html = html.replace('<link rel="stylesheet" href="css/buttons.css">', `<style>${buttonsCss}</style>`);
                }

                // Inline clicks CSS for click zones
                if (config.clickZones && config.clickZones.length > 0) {
                    const clicksCss = generateClicksCSS(config);
                    html = html.replace('<link rel="stylesheet" href="css/clicks.css">', `<style>${clicksCss}</style>`);

                    // Add visual zone indicators for preview (shows zone positions that scroll with content)
                    const zoneIndicatorCSS = `
                        .zone-indicator {
                            position: absolute;
                            border: 2px dashed rgba(245, 158, 11, 0.8);
                            background: rgba(245, 158, 11, 0.15);
                            pointer-events: none;
                            box-sizing: border-box;
                            z-index: 100;
                        }
                        .zone-indicator.in-isi {
                            border-color: rgba(16, 185, 129, 0.8);
                            background: rgba(16, 185, 129, 0.15);
                            pointer-events: auto;
                            cursor: grab;
                            transition: box-shadow 0.15s ease;
                        }
                        .zone-indicator.in-isi:hover {
                            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.4);
                            border-style: solid;
                        }
                        .zone-indicator-label {
                            position: absolute;
                            top: 2px;
                            left: 2px;
                            background: #f59e0b;
                            color: white;
                            padding: 2px 6px;
                            font-size: 10px;
                            font-weight: bold;
                            border-radius: 3px;
                            font-family: sans-serif;
                            pointer-events: none;
                        }
                        .zone-indicator.in-isi .zone-indicator-label {
                            background: #10b981;
                        }
                        .zone-indicator.in-isi .zone-resize {
                            position: absolute;
                            background: #10b981;
                            border-radius: 2px;
                            z-index: 101;
                            display: none;
                        }
                        .zone-indicator.in-isi.selected .zone-resize {
                            display: block;
                        }
                        .zone-resize.top { top: -4px; left: 50%; transform: translateX(-50%); width: 24px; height: 6px; cursor: ns-resize; }
                        .zone-resize.bottom { bottom: -4px; left: 50%; transform: translateX(-50%); width: 24px; height: 6px; cursor: ns-resize; }
                        .zone-resize.left { left: -4px; top: 50%; transform: translateY(-50%); width: 6px; height: 24px; cursor: ew-resize; }
                        .zone-resize.right { right: -4px; top: 50%; transform: translateY(-50%); width: 6px; height: 24px; cursor: ew-resize; }
                        .zone-resize.bottom-right { bottom: -4px; right: -4px; width: 8px; height: 8px; cursor: nwse-resize; border-radius: 50%; }
                    `;
                    html = html.replace('</head>', `<style>${zoneIndicatorCSS}</style></head>`);

                    // Inject zone indicator divs into the HTML for preview
                    const clickZones = config.clickZones || [];

                    // Container zones (not in ISI) - inject before </div> of container
                    const containerIndicators = clickZones
                        .filter(z => !z.inISI)
                        .map(z => `<div class="zone-indicator" style="top:${z.top}px;left:${z.left}px;width:${z.width}px;height:${z.height}px;"><span class="zone-indicator-label">${z.id}</span></div>`)
                        .join('');

                    // ISI zones - inject inside innerMostDiv so they scroll with content (draggable)
                    const isiIndicators = clickZones
                        .filter(z => z.inISI)
                        .map((z, i) => {
                            const idx = clickZones.indexOf(z);
                            return `<div class="zone-indicator in-isi" data-zone-index="${idx}" data-zone-id="${z.id}" style="top:${z.top}px;left:${z.left}px;width:${z.width}px;height:${z.height}px;cursor:grab;"><span class="zone-indicator-label">⊞ ${z.id}</span><div class="zone-resize top" data-resize="top"></div><div class="zone-resize bottom" data-resize="bottom"></div><div class="zone-resize left" data-resize="left"></div><div class="zone-resize right" data-resize="right"></div><div class="zone-resize bottom-right" data-resize="bottom-right"></div></div>`;
                        })
                        .join('');

                    // Inject container indicators before closing container div
                    if (containerIndicators) {
                        html = html.replace('</div>\n    <script', containerIndicators + '</div>\n    <script');
                    }

                    // Inject ISI indicators inside innerMostDiv (after ISI image)
                    if (isiIndicators && hasISI) {
                        html = html.replace('</div>\n            <div id="isi-controls">', isiIndicators + '</div>\n            <div id="isi-controls">');
                    }

                    // Inject drag + resize handling JavaScript for ISI zones
                    const dragScript = `
                    <script>
                    (function() {
                        var active = null;
                        var mode = 'move'; // 'move', 'top', 'bottom', 'left', 'right', 'bottom-right'
                        var startX = 0;
                        var startY = 0;
                        var startLeft = 0;
                        var startTop = 0;
                        var startWidth = 0;
                        var startHeight = 0;
                        var autoScrollOffset = 0;
                        var autoScrollInterval = null;
                        var selected = null;
                        var outerDiv = document.getElementById('outerMostDiv');
                        var innerDiv = document.getElementById('innerMostDiv');
                        var maxLeft = ${(config.isiWidth || config.dimensions.width) - 20};

                        function selectZone(el) {
                            if (selected) selected.classList.remove('selected');
                            selected = el;
                            if (el) el.classList.add('selected');
                        }

                        // Click zone body to select only (no move)
                        document.querySelectorAll('.zone-indicator.in-isi').forEach(function(el) {
                            el.addEventListener('mousedown', function(e) {
                                if (e.target.classList.contains('zone-resize') || e.target.classList.contains('zone-indicator-label')) return;
                                e.preventDefault();
                                e.stopPropagation();
                                selectZone(el);
                            });
                        });

                        // Move only from the label handle
                        document.querySelectorAll('.zone-indicator.in-isi .zone-indicator-label').forEach(function(label) {
                            label.addEventListener('mousedown', function(e) {
                                e.preventDefault();
                                e.stopPropagation();
                                var el = label.closest('.zone-indicator.in-isi');
                                if (!el) return;
                                selectZone(el);
                                active = el;
                                mode = 'move';
                                startX = e.clientX;
                                startY = e.clientY;
                                startLeft = parseInt(el.style.left) || 0;
                                startTop = parseInt(el.style.top) || 0;
                                startWidth = parseInt(el.style.width) || 0;
                                startHeight = parseInt(el.style.height) || 0;
                                autoScrollOffset = 0;
                                el.style.cursor = 'grabbing';
                                el.style.opacity = '0.8';
                                el.style.zIndex = '1000';
                            });
                        });

                        // Resize handle mousedown
                        document.querySelectorAll('.zone-resize').forEach(function(handle) {
                            handle.addEventListener('mousedown', function(e) {
                                e.preventDefault();
                                e.stopPropagation();
                                var el = handle.closest('.zone-indicator.in-isi');
                                if (!el) return;
                                selectZone(el);
                                active = el;
                                mode = handle.getAttribute('data-resize');
                                startX = e.clientX;
                                startY = e.clientY;
                                startLeft = parseInt(el.style.left) || 0;
                                startTop = parseInt(el.style.top) || 0;
                                startWidth = parseInt(el.style.width) || 0;
                                startHeight = parseInt(el.style.height) || 0;
                                autoScrollOffset = 0;
                                el.style.opacity = '0.8';
                                el.style.zIndex = '1000';
                            });
                        });

                        // Deselect on background click
                        document.addEventListener('mousedown', function(e) {
                            if (!e.target.closest('.zone-indicator.in-isi')) {
                                selectZone(null);
                            }
                        });

                        document.addEventListener('mousemove', function(e) {
                            if (!active) return;
                            e.preventDefault();

                            var deltaX = e.clientX - startX;
                            var deltaY = e.clientY - startY + autoScrollOffset;

                            if (mode === 'move') {
                                var newLeft = Math.max(0, Math.min(maxLeft, startLeft + deltaX));
                                var newTop = Math.max(0, startTop + deltaY);
                                active.style.left = newLeft + 'px';
                                active.style.top = newTop + 'px';
                            } else if (mode === 'right') {
                                active.style.width = Math.max(20, startWidth + deltaX) + 'px';
                            } else if (mode === 'bottom') {
                                active.style.height = Math.max(20, startHeight + deltaY) + 'px';
                            } else if (mode === 'left') {
                                var dw = Math.min(deltaX, startWidth - 20);
                                active.style.left = (startLeft + dw) + 'px';
                                active.style.width = (startWidth - dw) + 'px';
                            } else if (mode === 'top') {
                                var dh = Math.min(deltaY, startHeight - 20);
                                active.style.top = (startTop + dh) + 'px';
                                active.style.height = (startHeight - dh) + 'px';
                            } else if (mode === 'bottom-right') {
                                active.style.width = Math.max(20, startWidth + deltaX) + 'px';
                                active.style.height = Math.max(20, startHeight + deltaY) + 'px';
                            }

                            // Auto-scroll when near edges of outerMostDiv
                            if (outerDiv && innerDiv) {
                                var outerRect = outerDiv.getBoundingClientRect();
                                var edgeSize = 60;
                                var scrollSpeed = 15;

                                if (autoScrollInterval) {
                                    clearInterval(autoScrollInterval);
                                    autoScrollInterval = null;
                                }

                                if (e.clientY > outerRect.bottom - edgeSize && e.clientY < outerRect.bottom + 40) {
                                    autoScrollInterval = setInterval(function() {
                                        innerDiv.scrollTop += scrollSpeed;
                                        autoScrollOffset += scrollSpeed;
                                        if (mode === 'move') {
                                            var ct = parseInt(active.style.top) || 0;
                                            active.style.top = (ct + scrollSpeed) + 'px';
                                        } else if (mode === 'bottom' || mode === 'bottom-right') {
                                            var ch = parseInt(active.style.height) || 0;
                                            active.style.height = (ch + scrollSpeed) + 'px';
                                        }
                                    }, 20);
                                } else if (e.clientY < outerRect.top + edgeSize && e.clientY > outerRect.top - 40) {
                                    autoScrollInterval = setInterval(function() {
                                        if (innerDiv.scrollTop > 0) {
                                            innerDiv.scrollTop -= scrollSpeed;
                                            autoScrollOffset -= scrollSpeed;
                                            if (mode === 'move') {
                                                var ct = parseInt(active.style.top) || 0;
                                                active.style.top = Math.max(0, ct - scrollSpeed) + 'px';
                                            }
                                        }
                                    }, 20);
                                }
                            }
                        });

                        document.addEventListener('mouseup', function(e) {
                            if (!active) return;

                            if (autoScrollInterval) {
                                clearInterval(autoScrollInterval);
                                autoScrollInterval = null;
                            }

                            var zoneIndex = parseInt(active.getAttribute('data-zone-index'));
                            var newTop = parseInt(active.style.top) || 0;
                            var newLeft = parseInt(active.style.left) || 0;
                            var newWidth = parseInt(active.style.width) || 0;
                            var newHeight = parseInt(active.style.height) || 0;

                            active.style.cursor = 'grab';
                            active.style.opacity = '1';
                            active.style.zIndex = '100';

                            // Send position + size update to parent
                            window.parent.postMessage({
                                type: 'zonePositionUpdate',
                                zoneIndex: zoneIndex,
                                top: newTop,
                                left: newLeft,
                                width: newWidth,
                                height: newHeight
                            }, '*');

                            dragging = null;
                            autoScrollOffset = 0;
                        });
                    })();
                    <\/script>`;
                    html = html.replace('</body>', dragScript + '</body>');
                }

                // Inline ad.js
                html = html.replace('<script src="script/ad.js"><\/script>', `<script>${js}<\/script>`);

                // Inline main.js for ISI templates (scrolling functionality)
                if (hasISI) {
                    const mainJs = generateMainJS(config);
                    html = html.replace('<script src="script/main.js"><\/script>', `<script>${mainJs}<\/script>`);
                }

                // Replace asset paths with data URLs
                if (assets.background?.dataUrl) {
                    html = html.replace('src="assets/background.png"', `src="${assets.background.dataUrl}"`);
                }
                if (assets.isiImage?.dataUrl) {
                    html = html.replace('src="assets/isi.png"', `src="${assets.isiImage.dataUrl}"`);
                }
                if (assets.video?.dataUrl) {
                    html = html.replace('src="assets/video.mp4"', `src="${assets.video.dataUrl}"`);
                }

                // Replace frame assets
                if (assets.frames) {
                    assets.frames.forEach((frame, i) => {
                        if (frame?.dataUrl) {
                            html = html.replace(`src="assets/frame${i + 1}.png"`, `src="${frame.dataUrl}"`);
                        }
                    });
                }

                return html;
            }, [currentTemplate, config, assets, animations]);

            if (!currentTemplate) return <div className="text-gray-400 text-center p-8">Select a template</div>;

            const hasISI = hasFeature(currentTemplate, 'isi');

            const handleIsiMouseDown = (e, mode) => {
                e.stopPropagation();
                setIsiSelected(true);
                const startState = {
                    x: e.clientX,
                    y: e.clientY,
                    isiTop: config.isiTop,
                    isiHeight: config.isiHeight,
                    isiWidth: config.isiWidth || config.dimensions.width,
                    isiLeft: config.isiLeft || 0
                };
                setDragStart(startState);

                if (mode === 'move') {
                    setIsDragging(true);
                } else {
                    setResizeMode(mode);
                }
            };

            const handleMouseMove = (e) => {
                if (!isDragging && !resizeMode) return;

                const deltaX = (e.clientX - dragStart.x) / scale;
                const deltaY = (e.clientY - dragStart.y) / scale;

                if (isDragging) {
                    // Move the entire container
                    const newTop = Math.max(0, Math.min(config.dimensions.height - dragStart.isiHeight, dragStart.isiTop + deltaY));
                    const newLeft = Math.max(0, Math.min(config.dimensions.width - dragStart.isiWidth, dragStart.isiLeft + deltaX));
                    updateConfig('isiTop', Math.round(newTop));
                    updateConfig('isiLeft', Math.round(newLeft));
                } else if (resizeMode === 'top') {
                    // Resize from top edge
                    const newTop = Math.max(0, dragStart.isiTop + deltaY);
                    const newHeight = Math.max(100, dragStart.isiHeight - deltaY);
                    if (newTop >= 0 && newTop + newHeight <= config.dimensions.height) {
                        updateConfig('isiTop', Math.round(newTop));
                        updateConfig('isiHeight', Math.round(newHeight));
                    }
                } else if (resizeMode === 'bottom') {
                    // Resize from bottom edge
                    const newHeight = Math.max(100, dragStart.isiHeight + deltaY);
                    if (dragStart.isiTop + newHeight <= config.dimensions.height) {
                        updateConfig('isiHeight', Math.round(newHeight));
                    }
                } else if (resizeMode === 'left') {
                    // Resize from left edge
                    const newLeft = Math.max(0, dragStart.isiLeft + deltaX);
                    const newWidth = Math.max(100, dragStart.isiWidth - deltaX);
                    if (newLeft >= 0 && newLeft + newWidth <= config.dimensions.width) {
                        updateConfig('isiLeft', Math.round(newLeft));
                        updateConfig('isiWidth', Math.round(newWidth));
                    }
                } else if (resizeMode === 'right') {
                    // Resize from right edge
                    const newWidth = Math.max(100, dragStart.isiWidth + deltaX);
                    if (dragStart.isiLeft + newWidth <= config.dimensions.width) {
                        updateConfig('isiWidth', Math.round(newWidth));
                    }
                }
            };

            const handleMouseUp = () => {
                setIsDragging(false);
                setResizeMode(null);
            };

            const handleOverlayClick = (e) => {
                if (e.target === e.currentTarget) {
                    setIsiSelected(false);
                    setSelectedZoneIndex(null);
                }
            };

            // Click zone handlers
            const handleZoneMouseDown = (e, index, mode) => {
                e.stopPropagation();
                const zones = config.clickZones || [];
                if (!zones[index]) return;
                setSelectedZoneIndex(index);
                setIsiSelected(false); // Deselect ISI when selecting a zone
                const zone = zones[index];
                const startState = {
                    x: e.clientX,
                    y: e.clientY,
                    top: zone.top,
                    left: zone.left,
                    width: zone.width,
                    height: zone.height
                };
                setZoneDragStart(startState);
                setZoneDragOffset({ top: 0, left: 0, width: 0, height: 0 }); // Reset offset

                if (mode === 'move') {
                    setIsZoneDragging(true);
                } else {
                    setZoneResizeMode(mode);
                }
            };

            const handleZoneMouseMove = (e) => {
                if (!isZoneDragging && !zoneResizeMode) return;
                if (selectedZoneIndex === null) return;

                const zones = config.clickZones || [];
                if (!zones[selectedZoneIndex]) return;

                const deltaX = (e.clientX - zoneDragStart.x) / scale;
                const deltaY = (e.clientY - zoneDragStart.y) / scale;
                const zone = zones[selectedZoneIndex];

                // Get bounds based on whether zone is in ISI or container
                const maxWidth = zone.inISI ? (config.isiWidth || config.dimensions.width) : config.dimensions.width;
                // For ISI zones, allow positioning beyond visible ISI height (content can scroll)
                const isiContentHeight = assets.isiImage ? 5000 : config.isiHeight;
                const maxHeight = zone.inISI ? isiContentHeight : config.dimensions.height;

                // Calculate offset instead of updating config (to prevent iframe re-render)
                let offset = { top: 0, left: 0, width: 0, height: 0 };

                if (isZoneDragging) {
                    const newTop = Math.max(0, Math.min(maxHeight - zoneDragStart.height, zoneDragStart.top + deltaY));
                    const newLeft = Math.max(0, Math.min(maxWidth - zoneDragStart.width, zoneDragStart.left + deltaX));
                    offset = { top: newTop - zoneDragStart.top, left: newLeft - zoneDragStart.left, width: 0, height: 0 };
                } else if (zoneResizeMode === 'top') {
                    const newTop = Math.max(0, zoneDragStart.top + deltaY);
                    const newHeight = Math.max(20, zoneDragStart.height - deltaY);
                    if (newTop >= 0 && newTop + newHeight <= maxHeight) {
                        offset = { top: newTop - zoneDragStart.top, left: 0, width: 0, height: newHeight - zoneDragStart.height };
                    }
                } else if (zoneResizeMode === 'bottom') {
                    const newHeight = Math.max(20, zoneDragStart.height + deltaY);
                    if (zoneDragStart.top + newHeight <= maxHeight) {
                        offset = { top: 0, left: 0, width: 0, height: newHeight - zoneDragStart.height };
                    }
                } else if (zoneResizeMode === 'left') {
                    const newLeft = Math.max(0, zoneDragStart.left + deltaX);
                    const newWidth = Math.max(20, zoneDragStart.width - deltaX);
                    if (newLeft >= 0 && newLeft + newWidth <= maxWidth) {
                        offset = { top: 0, left: newLeft - zoneDragStart.left, width: newWidth - zoneDragStart.width, height: 0 };
                    }
                } else if (zoneResizeMode === 'right') {
                    const newWidth = Math.max(20, zoneDragStart.width + deltaX);
                    if (zoneDragStart.left + newWidth <= maxWidth) {
                        offset = { top: 0, left: 0, width: newWidth - zoneDragStart.width, height: 0 };
                    }
                }

                setZoneDragOffset(offset);
            };

            const handleZoneMouseUp = () => {
                // Commit the drag offset to config on mouse up
                if ((isZoneDragging || zoneResizeMode) && selectedZoneIndex !== null) {
                    const zones = config.clickZones || [];
                    if (zones[selectedZoneIndex]) {
                        const zone = zones[selectedZoneIndex];
                        const newZones = [...zones];
                        newZones[selectedZoneIndex] = {
                            ...zone,
                            top: Math.round(zone.top + zoneDragOffset.top),
                            left: Math.round(zone.left + zoneDragOffset.left),
                            width: Math.round(zone.width + zoneDragOffset.width),
                            height: Math.round(zone.height + zoneDragOffset.height)
                        };
                        updateConfig('clickZones', newZones);
                    }
                }
                setIsZoneDragging(false);
                setZoneResizeMode(null);
                setZoneDragOffset({ top: 0, left: 0, width: 0, height: 0 });
            };

            const handleCombinedMouseMove = (e) => {
                handleMouseMove(e);
                handleZoneMouseMove(e);
            };

            const handleCombinedMouseUp = () => {
                handleMouseUp();
                handleZoneMouseUp();
            };

            const previewContent = (
                <div
                    ref={containerRef}
                    style={{ width: config.dimensions.width * scale, height: config.dimensions.height * scale, overflow: 'hidden', background: 'white', boxShadow: '0 4px 6px rgba(0,0,0,0.1)', borderRadius: 4, position: 'relative' }}
                    onMouseMove={handleCombinedMouseMove}
                    onMouseUp={handleCombinedMouseUp}
                    onMouseLeave={handleCombinedMouseUp}
                    onClick={handleOverlayClick}
                >
                    <iframe ref={iframeRef} key={key} srcDoc={previewHTML} onLoad={handleIframeLoad} style={{ width: config.dimensions.width, height: config.dimensions.height, transform: `scale(${scale})`, transformOrigin: 'top left', border: 'none', pointerEvents: (isDragging || resizeMode || isZoneDragging || zoneResizeMode) ? 'none' : 'auto' }} title="Preview" />

                    {/* ISI Interactive Overlay - pointer events pass through to allow iframe scrolling */}
                    {hasISI && (
                        <div
                            style={{
                                position: 'absolute',
                                left: (config.isiLeft || 0) * scale,
                                top: config.isiTop * scale,
                                width: (config.isiWidth || config.dimensions.width) * scale,
                                height: config.isiHeight * scale,
                                border: isiSelected ? '2px solid #3b82f6' : '2px dashed rgba(59, 130, 246, 0.5)',
                                backgroundColor: 'transparent',
                                boxSizing: 'border-box',
                                pointerEvents: 'none', // Allow clicks to pass through to iframe for scrolling
                                transition: (isDragging || resizeMode) ? 'none' : 'all 0.15s ease'
                            }}
                        >
                            {/* Move handle - always visible, top-left corner */}
                            <div
                                onClick={(e) => { e.stopPropagation(); setIsiSelected(true); setSelectedZoneIndex(null); }}
                                onMouseDown={(e) => handleIsiMouseDown(e, 'move')}
                                style={{
                                    position: 'absolute',
                                    top: 4,
                                    left: 4,
                                    width: 28,
                                    height: 28,
                                    backgroundColor: isiSelected ? '#3b82f6' : 'rgba(59, 130, 246, 0.8)',
                                    borderRadius: 4,
                                    cursor: isDragging ? 'grabbing' : 'grab',
                                    pointerEvents: 'auto',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    color: 'white',
                                    fontSize: 14,
                                    fontWeight: 'bold',
                                    boxShadow: '0 1px 3px rgba(0,0,0,0.3)'
                                }}
                                title="Drag to move ISI container"
                            >
                                ⊞
                            </div>

                            {/* Resize handles - only when selected */}
                            {isiSelected && (
                                <>
                                    {/* Top resize handle */}
                                    <div
                                        onMouseDown={(e) => handleIsiMouseDown(e, 'top')}
                                        style={{
                                            position: 'absolute',
                                            top: -4,
                                            left: '50%',
                                            transform: 'translateX(-50%)',
                                            width: 40,
                                            height: 8,
                                            backgroundColor: '#3b82f6',
                                            borderRadius: 4,
                                            cursor: 'ns-resize',
                                            pointerEvents: 'auto'
                                        }}
                                    />
                                    {/* Bottom resize handle */}
                                    <div
                                        onMouseDown={(e) => handleIsiMouseDown(e, 'bottom')}
                                        style={{
                                            position: 'absolute',
                                            bottom: -4,
                                            left: '50%',
                                            transform: 'translateX(-50%)',
                                            width: 40,
                                            height: 8,
                                            backgroundColor: '#3b82f6',
                                            borderRadius: 4,
                                            cursor: 'ns-resize',
                                            pointerEvents: 'auto'
                                        }}
                                    />
                                    {/* Left resize handle */}
                                    <div
                                        onMouseDown={(e) => handleIsiMouseDown(e, 'left')}
                                        style={{
                                            position: 'absolute',
                                            left: -4,
                                            top: '50%',
                                            transform: 'translateY(-50%)',
                                            width: 8,
                                            height: 40,
                                            backgroundColor: '#3b82f6',
                                            borderRadius: 4,
                                            cursor: 'ew-resize',
                                            pointerEvents: 'auto'
                                        }}
                                    />
                                    {/* Right resize handle */}
                                    <div
                                        onMouseDown={(e) => handleIsiMouseDown(e, 'right')}
                                        style={{
                                            position: 'absolute',
                                            right: -4,
                                            top: '50%',
                                            transform: 'translateY(-50%)',
                                            width: 8,
                                            height: 40,
                                            backgroundColor: '#3b82f6',
                                            borderRadius: 4,
                                            cursor: 'ew-resize',
                                            pointerEvents: 'auto'
                                        }}
                                    />
                                    {/* Label - positioned next to move handle */}
                                    <div style={{
                                        position: 'absolute',
                                        top: 8,
                                        left: 38,
                                        backgroundColor: '#3b82f6',
                                        color: 'white',
                                        padding: '2px 8px',
                                        borderRadius: 4,
                                        fontSize: 11,
                                        fontWeight: 'bold',
                                        pointerEvents: 'none'
                                    }}>
                                        ISI Container
                                    </div>
                                    {/* Dimensions label */}
                                    <div style={{
                                        position: 'absolute',
                                        bottom: 8,
                                        right: 8,
                                        backgroundColor: 'rgba(0,0,0,0.7)',
                                        color: 'white',
                                        padding: '2px 6px',
                                        borderRadius: 4,
                                        fontSize: 10,
                                        pointerEvents: 'none'
                                    }}>
                                        {config.isiWidth || config.dimensions.width}x{config.isiHeight} @ ({config.isiLeft || 0}, {config.isiTop})
                                    </div>
                                </>
                            )}
                        </div>
                    )}


                    {/* Click Zone Overlays - only for non-ISI zones (ISI zones have in-iframe indicators) */}
                    {(config.clickZones || []).filter(z => !z.inISI).map((zone, index) => {
                        const actualIndex = (config.clickZones || []).indexOf(zone);
                        const isBeingDragged = (isZoneDragging || zoneResizeMode) && selectedZoneIndex === actualIndex;

                        // Apply drag offset if this zone is being dragged
                        const effectiveTop = zone.top + (isBeingDragged ? zoneDragOffset.top : 0);
                        const effectiveLeft = zone.left + (isBeingDragged ? zoneDragOffset.left : 0);
                        const effectiveWidth = zone.width + (isBeingDragged ? zoneDragOffset.width : 0);
                        const effectiveHeight = zone.height + (isBeingDragged ? zoneDragOffset.height : 0);

                        const isSelected = selectedZoneIndex === actualIndex;
                        const baseColor = '#f59e0b';

                        return (
                            <div
                                key={zone.id}
                                style={{
                                    position: 'absolute',
                                    left: effectiveLeft * scale,
                                    top: effectiveTop * scale,
                                    width: effectiveWidth * scale,
                                    height: effectiveHeight * scale,
                                    border: isSelected ? `2px solid ${baseColor}` : `2px dashed ${baseColor}`,
                                    backgroundColor: 'transparent',
                                    boxSizing: 'border-box',
                                    pointerEvents: 'none',
                                    transition: (isZoneDragging || zoneResizeMode) ? 'none' : 'all 0.15s ease'
                                }}
                            >
                                {/* Move handle - small draggable area */}
                                <div
                                    onClick={(e) => { e.stopPropagation(); setSelectedZoneIndex(actualIndex); setIsiSelected(false); }}
                                    onMouseDown={(e) => handleZoneMouseDown(e, actualIndex, 'move')}
                                    style={{
                                        position: 'absolute',
                                        top: 2,
                                        left: 2,
                                        backgroundColor: baseColor,
                                        color: 'white',
                                        padding: '2px 6px',
                                        borderRadius: 3,
                                        fontSize: 9,
                                        fontWeight: 'bold',
                                        whiteSpace: 'nowrap',
                                        pointerEvents: 'auto',
                                        cursor: isZoneDragging && selectedZoneIndex === actualIndex ? 'grabbing' : 'grab',
                                        boxShadow: '0 1px 2px rgba(0,0,0,0.2)'
                                    }}
                                    title="Drag to move zone"
                                >
                                    ⊞ {zone.id}
                                </div>

                                {/* Resize handles - only show when selected */}
                                {isSelected && (
                                    <>
                                        {/* Top resize handle */}
                                        <div
                                            onMouseDown={(e) => handleZoneMouseDown(e, actualIndex, 'top')}
                                            style={{
                                                position: 'absolute',
                                                top: -4,
                                                left: '50%',
                                                transform: 'translateX(-50%)',
                                                width: 30,
                                                height: 8,
                                                backgroundColor: baseColor,
                                                borderRadius: 4,
                                                cursor: 'ns-resize',
                                                pointerEvents: 'auto'
                                            }}
                                        />
                                        {/* Bottom resize handle */}
                                        <div
                                            onMouseDown={(e) => handleZoneMouseDown(e, actualIndex, 'bottom')}
                                            style={{
                                                position: 'absolute',
                                                bottom: -4,
                                                left: '50%',
                                                transform: 'translateX(-50%)',
                                                width: 30,
                                                height: 8,
                                                backgroundColor: baseColor,
                                                borderRadius: 4,
                                                cursor: 'ns-resize',
                                                pointerEvents: 'auto'
                                            }}
                                        />
                                        {/* Left resize handle */}
                                        <div
                                            onMouseDown={(e) => handleZoneMouseDown(e, actualIndex, 'left')}
                                            style={{
                                                position: 'absolute',
                                                left: -4,
                                                top: '50%',
                                                transform: 'translateY(-50%)',
                                                width: 8,
                                                height: 30,
                                                backgroundColor: baseColor,
                                                borderRadius: 4,
                                                cursor: 'ew-resize',
                                                pointerEvents: 'auto'
                                            }}
                                        />
                                        {/* Right resize handle */}
                                        <div
                                            onMouseDown={(e) => handleZoneMouseDown(e, actualIndex, 'right')}
                                            style={{
                                                position: 'absolute',
                                                right: -4,
                                                top: '50%',
                                                transform: 'translateY(-50%)',
                                                width: 8,
                                                height: 30,
                                                backgroundColor: baseColor,
                                                borderRadius: 4,
                                                cursor: 'ew-resize',
                                                pointerEvents: 'auto'
                                            }}
                                        />
                                        {/* Dimensions label */}
                                        <div style={{
                                            position: 'absolute',
                                            bottom: 2,
                                            right: 2,
                                            backgroundColor: 'rgba(0,0,0,0.7)',
                                            color: 'white',
                                            padding: '1px 4px',
                                            borderRadius: 2,
                                            fontSize: 8,
                                            pointerEvents: 'none'
                                        }}>
                                            {Math.round(effectiveWidth)}x{Math.round(effectiveHeight)} @ ({Math.round(effectiveLeft)}, {Math.round(effectiveTop)})
                                        </div>
                                    </>
                                )}
                            </div>
                        );
                    })}

                    {/* ISI Zone edit handles - positioned at ISI container edge */}
                    {(config.clickZones || []).filter(z => z.inISI).map((zone, index) => {
                        const actualIndex = (config.clickZones || []).indexOf(zone);
                        const isSelected = selectedZoneIndex === actualIndex;
                        const baseColor = '#10b981';

                        return (
                            <div
                                key={zone.id + '-handle'}
                                onClick={(e) => { e.stopPropagation(); setSelectedZoneIndex(actualIndex); setIsiSelected(false); }}
                                style={{
                                    position: 'absolute',
                                    left: ((config.isiLeft || 0) + (config.isiWidth || config.dimensions.width)) * scale + 4,
                                    top: (config.isiTop + 4 + index * 28) * scale,
                                    backgroundColor: isSelected ? baseColor : 'rgba(16, 185, 129, 0.8)',
                                    color: 'white',
                                    padding: '4px 8px',
                                    borderRadius: 4,
                                    fontSize: 10,
                                    fontWeight: 'bold',
                                    cursor: 'pointer',
                                    boxShadow: '0 1px 3px rgba(0,0,0,0.3)',
                                    whiteSpace: 'nowrap'
                                }}
                                title={`ISI Zone: ${zone.id} @ (${zone.left}, ${zone.top}) - Scroll ISI to see position`}
                            >
                                {zone.id} <span style={{ opacity: 0.7, fontSize: 8 }}>↓{zone.top}px</span>
                            </div>
                        );
                    })}
                </div>
            );

            return (
                <div className="space-y-4">
                    <div className="flex items-center gap-4 flex-wrap">
                        <span className="text-sm text-gray-600">Scale:</span>
                        <input type="range" min="0.2" max="1" step="0.1" value={scale} onChange={e => setScale(parseFloat(e.target.value))} className="w-32" />
                        <span className="text-sm text-gray-500">{Math.round(scale * 100)}%</span>
                        {(hasISI || (config.clickZones && config.clickZones.length > 0)) && (
                            <span className="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded">
                                ISI zones: drag in preview, auto-scrolls at edges
                            </span>
                        )}
                        <button onClick={() => setKey(k => k + 1)} className="ml-auto text-sm text-blue-600 hover:text-blue-800">
                            Refresh Preview
                        </button>
                    </div>
                    <DeviceSimulator dimensions={config.dimensions}>
                        {previewContent}
                    </DeviceSimulator>
                    <p className="text-center text-xs text-gray-400">{config.dimensions.width} x {config.dimensions.height}px</p>
                </div>
            );
        }

        // ============================================
        // EXPORT
        // ============================================
        async function exportZip() {
            const state = projectStore.getState();
            const { currentTemplate, config, assets, projectName, animations } = state;

            if (!currentTemplate) return alert('No template selected');

            const zip = new JSZip();

            // HTML
            zip.file('index.html', generateHTML(currentTemplate, config, assets, animations || []));

            // CSS
            const cssFolder = zip.folder('css');
            cssFolder.file('main.css', generateCSS(config));

            // Add scroller.css for ISI templates
            if (hasFeature(currentTemplate, 'isi')) {
                cssFolder.file('scroller.css', generateScrollerCSS(config));
            }

            // Add buttons.css for video templates with buttons
            if (hasFeature(currentTemplate, 'video') && config.buttonCount > 0) {
                cssFolder.file('buttons.css', generateButtonsCSS(config));
            }

            // Add clicks.css for click zones
            if (config.clickZones && config.clickZones.length > 0) {
                cssFolder.file('clicks.css', generateClicksCSS(config));
            }

            // JS
            const scriptFolder = zip.folder('script');
            scriptFolder.file('ad.js', generateAdJS(config));

            // Add main.js for ISI templates (scrolling functionality)
            if (hasFeature(currentTemplate, 'isi')) {
                scriptFolder.file('main.js', generateMainJS(config));
            }

            // Assets
            const assetsFolder = zip.folder('assets');

            const dataUrlToBlob = (dataUrl) => {
                const parts = dataUrl.split(',');
                const mime = parts[0].match(/:(.*?);/)[1];
                const bstr = atob(parts[1]);
                const arr = new Uint8Array(bstr.length);
                for (let i = 0; i < bstr.length; i++) arr[i] = bstr.charCodeAt(i);
                return new Blob([arr], { type: mime });
            };

            if (assets.background?.dataUrl) {
                assetsFolder.file('background.png', dataUrlToBlob(assets.background.dataUrl));
            }
            if (assets.isiImage?.dataUrl) {
                assetsFolder.file('isi.png', dataUrlToBlob(assets.isiImage.dataUrl));
            }
            if (assets.video?.dataUrl) {
                assetsFolder.file('video.mp4', dataUrlToBlob(assets.video.dataUrl));
            }
            assets.frames?.forEach((frame, i) => {
                if (frame?.dataUrl) assetsFolder.file(`frame${i + 1}.png`, dataUrlToBlob(frame.dataUrl));
            });

            const blob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${projectName || 'ad-export'}.zip`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ============================================
        // SIDEBAR
        // ============================================
        function Sidebar({ activeSection, onSectionChange }) {
            const currentTemplate = useProjectStore(s => s.currentTemplate);
            const sections = [
                { id: 'assets', label: 'Assets', icon: '🖼️' },
                { id: 'config', label: 'Config', icon: '⚙️' },
                ...(!hasFeature(currentTemplate, 'video') ? [{ id: 'zones', label: 'Click Zones', icon: '🔗' }] : []),
                ...(hasFeature(currentTemplate, 'isi') ? [{ id: 'isi', label: 'ISI', icon: '📄' }] : []),
                ...(hasFeature(currentTemplate, 'animation') ? [{ id: 'timeline', label: 'Timeline', icon: '🎬' }] : []),
                { id: 'code', label: 'Code', icon: '💻' },
                { id: 'validation', label: 'Validate', icon: '✓' }
            ];

            return (
                <aside className="w-16 bg-gray-900 flex flex-col items-center py-4 gap-2">
                    {sections.map(s => (
                        <button key={s.id} onClick={() => onSectionChange(s.id)} title={s.label}
                            className={`w-12 h-12 rounded-lg flex items-center justify-center text-xl ${activeSection === s.id ? 'bg-blue-600 text-white' : 'text-gray-400 hover:text-white hover:bg-gray-800'}`}>
                            {s.icon}
                        </button>
                    ))}
                </aside>
            );
        }

        // ============================================
        // HEADER
        // ============================================
        function Header() {
            const projectName = useProjectStore(s => s.projectName);
            const currentTemplate = useProjectStore(s => s.currentTemplate);
            const [saveStatus, setSaveStatus] = useState('saved');

            // Show save status on state changes
            useEffect(() => {
                const unsubscribe = projectStore.subscribe(() => {
                    setSaveStatus('saving');
                    setTimeout(() => setSaveStatus('saved'), 1500);
                });
                return unsubscribe;
            }, []);

            const handleSave = () => {
                const state = projectStore.getState();
                const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${projectName || 'project'}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleLoad = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        setProjectState(data);
                    } catch { alert('Invalid project file'); }
                };
                reader.readAsText(file);
            };

            const handleDuplicate = () => {
                const state = projectStore.getState();
                const newName = `${projectName || 'Project'} (Copy)`;
                // Create duplicate with new name
                setProjectState({ projectName: newName });
                // Export the duplicate as a file
                const duplicateState = { ...state, projectName: newName };
                const blob = new Blob([JSON.stringify(duplicateState, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${newName}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            return (
                <header className="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
                    <div className="flex items-center gap-4">
                        <button onClick={clearProject} className="text-gray-500 hover:text-gray-700" title="Back">
                            ← Back
                        </button>
                        <div>
                            <input type="text" value={projectName} onChange={e => setProjectState({ projectName: e.target.value })}
                                className="text-lg font-semibold bg-transparent border-b border-transparent hover:border-gray-300 focus:border-blue-500 focus:outline-none px-1"
                                placeholder="Project name" />
                            {currentTemplate && <p className="text-sm text-gray-500">{currentTemplate.name}</p>}
                        </div>
                        {/* Auto-save indicator */}
                        <div className={`flex items-center gap-1 px-2 py-1 rounded text-xs ${saveStatus === 'saving' ? 'text-yellow-600 bg-yellow-50' : 'text-green-600 bg-green-50'}`}>
                            {saveStatus === 'saving' ? (
                                <>
                                    <span className="w-2 h-2 bg-yellow-500 rounded-full animate-pulse" />
                                    Saving...
                                </>
                            ) : (
                                <>
                                    <span className="w-2 h-2 bg-green-500 rounded-full" />
                                    Auto-saved
                                </>
                            )}
                        </div>
                    </div>
                    <div className="flex items-center gap-2">
                        <label className="px-3 py-2 text-gray-600 hover:text-gray-800 cursor-pointer text-sm">
                            Load
                            <input type="file" accept=".json" onChange={handleLoad} className="hidden" />
                        </label>
                        <button onClick={handleSave} className="px-3 py-2 text-gray-600 hover:text-gray-800 text-sm">Save</button>
                        <button onClick={handleDuplicate} className="px-3 py-2 text-gray-600 hover:text-gray-800 text-sm" title="Save a copy with a new name">
                            Duplicate
                        </button>
                        <button onClick={exportZip} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">
                            Export Ad
                        </button>
                    </div>
                </header>
            );
        }

        // ============================================
        // MAIN LAYOUT
        // ============================================
        function MainLayout() {
            const [activeSection, setActiveSection] = useState('assets');

            const renderEditor = () => {
                switch (activeSection) {
                    case 'assets': return <AssetManager />;
                    case 'config': return <ConfigPanel />;
                    case 'isi': return <ISIEditor />;
                    case 'zones': return <ClickZonesEditor />;
                    case 'timeline': return <AnimationTimeline />;
                    case 'code': return <CodeView />;
                    case 'validation': return <ValidationReport />;
                    default: return <AssetManager />;
                }
            };

            return (
                <div className="h-screen flex flex-col">
                    <Header />
                    <div className="flex-1 flex overflow-hidden">
                        <Sidebar activeSection={activeSection} onSectionChange={setActiveSection} />
                        <div className="w-96 bg-white border-r border-gray-200 overflow-y-auto">
                            {renderEditor()}
                        </div>
                        <div className="flex-1 bg-gray-100 p-4 overflow-auto">
                            <h3 className="text-sm font-medium text-gray-700 mb-4">Preview</h3>
                            <PreviewIframe />
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // APP
        // ============================================
        function App() {
            const currentTemplate = useProjectStore(s => s.currentTemplate);
            const [initialized, setInitialized] = useState(false);
            const [showRestorePrompt, setShowRestorePrompt] = useState(false);

            // Check for saved project on mount
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        if (data.currentTemplate) {
                            setShowRestorePrompt(true);
                        }
                    } catch (e) {}
                }
                setInitialized(true);
            }, []);

            const handleRestore = () => {
                loadFromLocalStorage();
                setShowRestorePrompt(false);
            };

            const handleStartFresh = () => {
                localStorage.removeItem(STORAGE_KEY);
                setShowRestorePrompt(false);
            };

            if (!initialized) {
                return <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                    <p className="text-gray-500">Loading...</p>
                </div>;
            }

            // Show restore prompt
            if (showRestorePrompt && !currentTemplate) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                        <div className="bg-white rounded-lg shadow-lg p-6 max-w-md mx-4">
                            <h2 className="text-lg font-semibold text-gray-900 mb-2">Resume Previous Session?</h2>
                            <p className="text-gray-600 mb-4">You have an unsaved project from a previous session. Would you like to continue where you left off?</p>
                            <div className="flex gap-3">
                                <button onClick={handleRestore} className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                    Restore Project
                                </button>
                                <button onClick={handleStartFresh} className="flex-1 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                                    Start Fresh
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50">
                    {currentTemplate ? <MainLayout /> : <TemplateGrid />}
                </div>
            );
        }

        // ============================================
        // RENDER
        // ============================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
